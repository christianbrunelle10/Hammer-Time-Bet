<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080808;color:#fff;font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ── MATCHUP HERO ── */

.matchup-inner{max-width:1200px;margin:0 auto}
.matchup-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}

  .scoreboard{flex-direction:column}

<htb-nav></htb-nav>

<div id="game-root">
  <div class="htb-loading">
    <div class="htb-spinner"></div>
    Loading game data…
  </div>
</div>

<footer>
  <div class="footer-brand">Hammer<em>Time</em>Bet</div>
  <p>For entertainment purposes only. Not financial advice. Must be 21+. Please gamble responsibly.</p>
</footer>

<script>
/* ============================================================
   ESPN SUMMARY ENDPOINTS
   ============================================================ */
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports';
const ESPN_SUMMARY = {
  mlb:   id => `${ESPN_BASE}/baseball/mlb/summary?event=${id}`,
  nba:   id => `${ESPN_BASE}/basketball/nba/summary?event=${id}`,
  nfl:   id => `${ESPN_BASE}/football/nfl/summary?event=${id}`,
  ncaaf: id => `${ESPN_BASE}/football/college-football/summary?event=${id}`,
  ncaam: id => `${ESPN_BASE}/basketball/mens-college-basketball/summary?event=${id}`,
  nhl:   id => `${ESPN_BASE}/hockey/nhl/summary?event=${id}`,
};

/* ============================================================
   ESPN DATA PARSER
   Extracts score, linescore, and team stats from summary JSON
   ============================================================ */
function parseGame(data, sport, gameId) {
  const comp   = data.header?.competitions?.[0] || {};
  const comps  = comp.competitors || [];
  const away   = comps.find(c => c.homeAway === 'away') || comps[0] || {};
  const home   = comps.find(c => c.homeAway === 'home') || comps[1] || {};
  const status = comp.status || {};
  const state  =
    status.type?.state === 'in'   ? 'live'  :
    status.type?.state === 'post' ? 'final' : 'pre';

  const gameTime = (() => {
    if (state !== 'pre') return status.type?.shortDetail || '';
    try {
      const d = new Date(comp.date || '');
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
    } catch { return comp.date || ''; }
  })();

  return {
    id:       String(comp.id || gameId),
    sport,
    status:   state,
    gameTime: state === 'pre' ? gameTime : status.type?.shortDetail || '',
    period:   state === 'live' ? (status.type?.shortDetail || 'In Progress') : '',
    away: {
      name:  away.team?.displayName || away.team?.name || 'Away',
      abbr:  away.team?.abbreviation || '',
      score: away.score || '0',
      rec:   away.records?.[0]?.summary || '',
    },
    home: {
      name:  home.team?.displayName || home.team?.name || 'Home',
      abbr:  home.team?.abbreviation || '',
      score: home.score || '0',
      rec:   home.records?.[0]?.summary || '',
    },
  };
}

/* ============================================================
   LINESCORE PARSER  — extracts period-by-period scoring
   ============================================================ */
function parseLinescore(data, sport, game) {
  const boxscore = data.boxscore || {};
  const teams    = boxscore.teams || [];
  if (!teams.length) return null;

  const awayTeam = teams.find(t => t.homeAway === 'away') || teams[0];
  const homeTeam = teams.find(t => t.homeAway === 'home') || teams[1];

  /* Period labels by sport */
  const periodLabel = {
    mlb:   i => `${i + 1}`,
    nba:   i => `Q${i + 1}`,
    nfl:   i => `Q${i + 1}`,
    ncaaf: i => `Q${i + 1}`,
    ncaam: i => i < 2 ? `H${i + 1}` : `OT${i - 1}`,
    nhl:   i => `P${i + 1}`,
  }[sport] || (i => `${i + 1}`);

  /* Try to pull line scores from the competitions competitors */
  const comp   = data.header?.competitions?.[0] || {};
  const comps  = comp.competitors || [];
  const awayC  = comps.find(c => c.homeAway === 'away') || comps[0] || {};
  const homeC  = comps.find(c => c.homeAway === 'home') || comps[1] || {};
  const awayLS = awayC.linescores || [];
  const homeLS = homeC.linescores || [];

  if (!awayLS.length && !homeLS.length) return null;

  const count = Math.max(awayLS.length, homeLS.length);
  const lines = Array.from({ length: count }, (_, i) => ({
    label:   periodLabel(i),
    awayVal: awayLS[i]?.displayValue ?? '—',
    homeVal: homeLS[i]?.displayValue ?? '—',
  }));

  return {
    awayName:  game.away.name,
    homeName:  game.home.name,
    awayScore: game.away.score,
    homeScore: game.home.score,
    lines,
  };
}

/* ============================================================
   TEAM STATS PARSER  — pulls stats from boxscore.teams
   Handles both flat statistics[] (NBA/NFL/NHL) and
   category-nested statistics[].stats[] (MLB) formats.
   Uses ESPN's own label fields — no hardcoded key→label map needed.
   ============================================================ */
function parseTeamStats(data, sport, game) {
  const teams = (data.boxscore || {}).teams || [];
  if (!teams.length) return [];

  const awayTeam = teams.find(t => t.homeAway === 'away') || teams[0];
  const homeTeam = teams.find(t => t.homeAway === 'home') || teams[1] || teams[0];

  /* Flatten stats — handles {name, displayValue} flat lists AND {name, stats:[]} category nesting */
  function flatten(statList) {
    const vals = {}, lbls = {};
    (statList || []).forEach(s => {
      if (s.stats) {
        /* MLB category format: {name:'batting', stats:[{name:'hits', displayValue:'7'}]} */
        s.stats.forEach(sub => {
          if (!sub.name) return;
          const v = sub.displayValue != null ? String(sub.displayValue) : '';
          if (v !== '') vals[sub.name] = v;
          const l = sub.label || sub.displayName || sub.shortDisplayName;
          if (l) lbls[sub.name] = l;
        });
      } else if (s.name) {
        /* Flat format: {name:'totalYards', displayValue:'324', label:'Total Yards'} */
        const v = s.displayValue != null ? String(s.displayValue) : '';
        if (v !== '') vals[s.name] = v;
        const l = s.label || s.displayName || s.shortDisplayName;
        if (l) lbls[s.name] = l;
      }
    });
    return { vals, lbls };
  }

  const aw = flatten(awayTeam?.statistics);
  const hw = flatten(homeTeam?.statistics);
  const labelMap = { ...hw.lbls, ...aw.lbls };

  /* All keys present in either team, preserving away-team ordering */
  const allKeys = [
    ...Object.keys(aw.vals),
    ...Object.keys(hw.vals).filter(k => !(k in aw.vals)),
  ];
  if (!allKeys.length) return [];

  /* Priority keys per sport (ESPN's actual camelCase names) */
  const priority = {
    mlb:   ['runs','hits','errors','leftOnBase','homeRuns','strikeOuts','walks','rbi'],
    nba:   ['fieldGoals','threePointFieldGoals','freeThrows','totalRebounds',
            'offensiveRebounds','assists','steals','blocks','turnovers','fouls'],
    nfl:   ['totalYards','passingYards','rushingYards','firstDowns','turnovers',
            'thirdDownEff','redZoneEff','penaltyYards'],
    ncaaf: ['totalYards','passingYards','rushingYards','firstDowns','turnovers','thirdDownEff'],
    ncaam: ['fieldGoals','threePointFieldGoals','freeThrows','totalRebounds',
            'assists','steals','turnovers'],
    nhl:   ['shotsOnGoal','saves','savePct','powerPlayGoals','powerPlayOpportunities',
            'hits','faceOffWinPercentage','blockedShots','giveaways','takeaways'],
  };
  const wantedLower = new Set((priority[sport] || []).map(k => k.toLowerCase()));

  const prioRows = [], otherRows = [];
  allKeys.forEach(key => {
    const av = aw.vals[key];
    const hv = hw.vals[key];
    if (!av && !hv) return;
    const rawLabel = labelMap[key] ||
      key.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/^./, c => c.toUpperCase());
    const row = { label: rawLabel, away: av || '—', home: hv || '—' };
    (wantedLower.has(key.toLowerCase()) ? prioRows : otherRows).push(row);
  });

  /* Priority stats first; if nothing matched priority, show first 10 from ESPN */
  return prioRows.length ? prioRows : otherRows.slice(0, 10);
}

/* ============================================================
   PLAYER STATS COLUMN FILTER — per-sport label whitelist
   Returns [{label, idx}] for columns to display
   ============================================================ */
function filterStatCols(labels, sport, catName) {
  const all = labels.map((l, i) => ({ label: l, idx: i }));
  const wantNBA   = new Set(['MIN','FG','3PT','FT','OREB','REB','AST','STL','BLK','TO','PF','PTS']);
  const wantNCAAM = new Set(['MIN','FG','3PT','FT','REB','AST','STL','TO','PTS']);
  const mlbWant = {
    batting:  new Set(['AB','R','H','RBI','HR','BB','SO','AVG']),
    pitching: new Set(['IP','H','R','ER','BB','SO','HR','ERA']),
  };
  const nhlWant = {
    skaters: new Set(['G','A','PTS','+/-','SOG','PIM']),
    goalies: new Set(['SA','GA','SV','SV%','TOI']),
  };

  if (sport === 'nba') {
    const f = all.filter(c => wantNBA.has(c.label));
    return f.length ? f : all.slice(0, 10);
  }
  if (sport === 'ncaam') {
    const f = all.filter(c => wantNCAAM.has(c.label));
    return f.length ? f : all.slice(0, 9);
  }
  if (sport === 'mlb') {
    const ws = mlbWant[catName.toLowerCase()];
    if (ws) {
      const f = all.filter(c => ws.has(c.label));
      return f.length ? f : all.slice(0, 8);
    }
  }
  if (sport === 'nhl') {
    const ws = nhlWant[catName.toLowerCase()];
    if (ws) {
      const f = all.filter(c => ws.has(c.label));
      return f.length ? f : all.slice(0, 6);
    }
  }
  return all; // NFL/NCAAF have reasonable column counts — show all
}

/* ============================================================
   PLAYER STATS PARSER — ESPN boxscore.players[]
   Each entry: {teamName, homeAway, categories:[{name,displayName,cols,athletes}]}
   ============================================================ */
function parsePlayerStats(data, sport, game) {
  const pd = (data.boxscore || {}).players || [];
  if (!pd.length) return [];

  const result = [];
  pd.forEach(entry => {
    const teamName = entry.team?.displayName || entry.team?.name ||
      (entry.homeAway === 'away' ? game.away.name : game.home.name);
    const homeAway = entry.homeAway || '';
    const categories = [];

    (entry.statistics || []).forEach(cat => {
      const catName = cat.name || '';
      const allLabels = cat.labels || cat.keys || [];
      if (!allLabels.length) return;

      const cols = filterStatCols(allLabels, sport, catName);
      if (!cols.length) return;

      const athletes = (cat.athletes || []).filter(a =>
        a.stats && a.stats.some(v => v != null && v !== '' && v !== '0' && v !== '0.0' && v !== '--' && v !== '-')
      );
      if (!athletes.length) return;

      categories.push({
        name: catName,
        displayName: cat.displayName || catName.replace(/^(.)/, c => c.toUpperCase()),
        cols,
        athletes: athletes.map(a => ({
          name: a.athlete?.shortName || a.athlete?.displayName || '—',
          stats: a.stats || [],
        })),
      });
    });

    if (categories.length) result.push({ teamName, homeAway, categories });
  });

  return result;
}

/* ============================================================
   RECENT PLAYS PARSER  — scoring plays / drives / play-by-play
   ============================================================ */
function parsePlays(data, sport) {
  const plays = [];

  /* NFL/NCAAF: drive summaries */
  if (sport === 'nfl' || sport === 'ncaaf') {
    const drives = data.drives?.previous || [];
    if (drives.length) {
      drives.slice(-5).reverse().forEach(drive => {
        const result = drive.result || drive.displayResult || '';
        const team   = drive.team?.abbreviation || drive.offensiveTeam?.abbreviation || '';
        const pos    = drive.start?.text || '';
        const yards  = typeof drive.yards === 'number' ? `${drive.yards} yds` : '';
        const nplays = drive.offensivePlays != null ? `${drive.offensivePlays} plays` : '';
        const detail = [nplays, yards].filter(Boolean).join(', ');
        const desc   = result ? `${result}${detail ? ` (${detail})` : ''}` : '';
        if (desc) plays.push({ time: pos, team, desc, score: '' });
      });
      if (plays.length) return plays;
    }
  }

  /* Detailed play-by-play array (live games) */
  const playsArr = data.plays || [];
  if (playsArr.length) {
    playsArr.slice(-8).reverse().forEach(p => {
      const pDisp = p.period?.displayValue || '';
      const pNum  = p.period?.number ?? p.period?.value ?? '';
      let pLabel  = pDisp;
      if (!pLabel && pNum !== '') {
        pLabel = sport === 'mlb'  ? `${Number(pNum) % 2 === 1 ? 'Top' : 'Bot'} ${Math.ceil(Number(pNum) / 2)}` :
                 sport === 'nhl'  ? `P${pNum}` :
                 (sport === 'nba' || sport === 'ncaam') ? `Q${pNum}` : `Qtr ${pNum}`;
      }
      const clock  = p.clock?.displayValue || '';
      const time   = [pLabel, clock].filter(Boolean).join(' ').trim();
      const team   = p.team?.abbreviation || p.team?.shortDisplayName || '';
      const desc   = p.text || p.type?.text || p.description || '';
      const aScore = p.awayScore ?? p.awayTeamScore ?? null;
      const hScore = p.homeScore ?? p.homeTeamScore ?? null;
      const score  = (aScore != null && hScore != null) ? `${aScore}–${hScore}` : '';
      if (desc) plays.push({ time, team, desc, score });
    });
    if (plays.length) return plays.slice(0, 8);
  }

  /* Scoring plays — all sports */
  const scoring = data.scoringPlays || [];
  if (scoring.length) {
    scoring.slice(-8).reverse().forEach(p => {
      const pDisp = p.period?.displayValue || '';
      const pNum  = p.period?.number ?? p.period?.value ?? '';
      let pLabel  = pDisp;
      if (!pLabel && pNum !== '') {
        pLabel = sport === 'mlb'  ? `${Number(pNum) % 2 === 1 ? 'Top' : 'Bot'} ${Math.ceil(Number(pNum) / 2)}` :
                 sport === 'nhl'  ? `P${pNum}` :
                 (sport === 'nba' || sport === 'ncaam') ? `Q${pNum}` : `Qtr ${pNum}`;
      }
      const clock  = p.clock?.displayValue || '';
      const time   = [pLabel, clock].filter(Boolean).join(' ').trim();
      const team   = p.team?.abbreviation || p.team?.shortDisplayName || '';
      const desc   = p.text || p.shortText || p.description || p.type?.text || '';
      const aScore = p.awayScore ?? p.awayTeamScore ?? null;
      const hScore = p.homeScore ?? p.homeTeamScore ?? null;
      const score  = (aScore != null && hScore != null) ? `${aScore}–${hScore}` : '';
      if (desc) plays.push({ time, team, desc, score });
    });
  }

  return plays.slice(0, 8);
}

/* ============================================================
   RENDERERS
   ============================================================ */
function renderHero(game) {
  const isLive  = game.status === 'live';
  const isFinal = game.status === 'final';
  const showScore = isLive || isFinal;
  const aScore = game.away.score;
  const hScore = game.home.score;
  const aLead  = parseInt(aScore) > parseInt(hScore);
  const statusLbl = isLive ? 'LIVE' : isFinal ? 'FINAL' : game.gameTime;
  const statusCls = isLive ? 'live' : isFinal ? 'final' : 'pre';
  const sportLabel = game.sport.toUpperCase();
  const backHref = `/${game.sport}/`;

  return `
    <div class="back-wrap">
      <a href="${backHref}" class="back-link">Back to ${sportLabel}</a>
    </div>
    <div class="matchup-hero">
      <div class="matchup-inner">
        <div class="matchup-meta">
          <span class="sport-tag">${sportLabel}</span>
          <span class="game-status-badge ${statusCls}">
            ${isLive ? '<span class="live-dot"></span>' : ''}${statusLbl}
          </span>
          ${isLive ? '<span class="refresh-lbl">Auto-refreshing every 30s</span>' : ''}
        </div>
        <div class="scoreboard">
          <div class="team-block ${showScore && aLead ? 'winner' : ''}">
            <div class="team-label">Away</div>
            <div class="team-name">${game.away.name}</div>
            ${game.away.rec ? `<div class="team-record">${game.away.rec}</div>` : ''}
            <div class="team-score ${showScore ? (aLead ? 'lead' : 'trail') : 'pre'}">${showScore ? aScore : game.gameTime}</div>
          </div>
          <div class="vs-col">
            <div class="vs-label">VS</div>
            ${isLive ? `<div class="live-period">${game.period}</div>` : ''}
            ${!showScore ? `<div class="game-time-lbl">${game.gameTime}</div>` : ''}
          </div>
          <div class="team-block ${showScore && !aLead ? 'winner' : ''}">
            <div class="team-label">Home</div>
            <div class="team-name">${game.home.name}</div>
            ${game.home.rec ? `<div class="team-record">${game.home.rec}</div>` : ''}
            <div class="team-score ${showScore ? (!aLead ? 'lead' : 'trail') : 'pre'}">${showScore ? hScore : game.gameTime}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderLinescore(ls, sport) {
  if (!ls || !ls.lines.length) return `<p class="empty-msg">Box score will appear once the game starts.</p>`;
  const hdrs = ls.lines.map(l => `<th>${l.label}</th>`).join('');
  const aRow = ls.lines.map(l => `<td>${l.awayVal}</td>`).join('');
  const hRow = ls.lines.map(l => `<td>${l.homeVal}</td>`).join('');
  return `
    <div class="bs-table-wrap">
      <table class="bs-table">
        <thead><tr><th>Team</th>${hdrs}<th class="bs-sep">Total</th></tr></thead>
        <tbody>
          <tr><td>${ls.awayName}</td>${aRow}<td class="bs-sep">${ls.awayScore}</td></tr>
          <tr><td>${ls.homeName}</td>${hRow}<td class="bs-sep">${ls.homeScore}</td></tr>
        </tbody>
      </table>
    </div>`;
}

function renderStats(stats, game) {
  if (!stats.length) return `<p class="empty-msg">Team stats not available for this game.</p>`;
  return `
    <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:4px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444;padding:0 12px;margin-bottom:10px">
      <span>${game.away.name}</span><span></span><span style="text-align:right">${game.home.name}</span>
    </div>
    <div class="stats-grid">
      ${stats.map(s => {
        const aNum = parseFloat(String(s.away).replace('%',''));
        const hNum = parseFloat(String(s.home).replace('%',''));
        const total = aNum + hNum;
        const aWidth = total > 0 ? Math.round((aNum / total) * 100) : 50;
        const hWidth = 100 - aWidth;
        return `
          <div class="stat-row">
            <span class="stat-away">${s.away}</span>
            <span class="stat-lbl">${s.label}</span>
            <span class="stat-home">${s.home}</span>
          </div>`;
      }).join('')}
    </div>`;
}

function renderPlays(plays) {
  if (!plays.length) return `<p class="empty-msg">Live play-by-play is not available for this matchup.</p>`;
  return `
    <div class="plays-list">
      ${plays.map(p => `
        <div class="play-row">
          <span class="play-time">${p.time}</span>
          <span class="play-team">${p.team}</span>
          <span class="play-desc">${p.desc}</span>
          ${p.score ? `<span class="play-score">${p.score}</span>` : ''}
        </div>`).join('')}
    </div>`;
}

/* ============================================================
   PLAYER STATS RENDERER — individual athlete stat tables
   ============================================================ */
function renderPlayerStats(playerStats, game, sport) {
  if (!playerStats.length) {
    return `<p class="empty-msg">Player stats not available for this game.</p>`;
  }
  return playerStats.map(team => `
    <div class="ps-team-block">
      <div class="ps-team-name">${team.teamName}</div>
      ${team.categories.map(cat => `
        <div class="ps-cat-block">
          <div class="ps-cat-title">${cat.displayName}</div>
          <div class="ps-tbl-wrap">
            <table class="ps-tbl">
              <thead>
                <tr>
                  <th class="ps-pl">Player</th>
                  ${cat.cols.map(c => `<th>${c.label}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${cat.athletes.map(a => `
                  <tr>
                    <td class="ps-pl">${a.name}</td>
                    ${cat.cols.map(c => `<td>${a.stats[c.idx] ?? '—'}</td>`).join('')}
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function showError(msg) {
  document.getElementById('game-root').innerHTML = `
    <div class="not-found">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <h2>Game Not Found</h2>
      <p>${msg}</p>
      <a href="../" style="display:inline-block;margin-top:20px;color:#f0b429;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">← Back to Home</a>
    </div>`;
}

/* ============================================================
   RENDER — builds the full page from parsed data
   ============================================================ */
function renderPage(game, linescore, stats, playerStats, plays) {
  document.title = `${game.away.name} vs ${game.home.name} — Live — HammerTimeBet`;

  document.getElementById('game-root').innerHTML = `
    ${renderHero(game)}

    <!-- BOX SCORE / LINESCORE -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Score Breakdown</div>
          <h2 class="sec-title">Box Score</h2>
        </div>
        ${renderLinescore(linescore, game.sport)}
      </div>
    </section>

    <!-- TEAM STATS -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">In-Game Stats</div>
          <h2 class="sec-title">Team Stats</h2>
        </div>
        ${renderStats(stats, game)}
      </div>
    </section>

    <!-- PLAYER STATS -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Player Breakdown</div>
          <h2 class="sec-title">Player Stats</h2>
        </div>
        ${renderPlayerStats(playerStats, game, game.sport)}
      </div>
    </section>

    <!-- RECENT PLAYS -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Game Flow</div>
          <h2 class="sec-title">Recent Plays</h2>
        </div>
        ${renderPlays(plays)}
      </div>
    </section>
  `;
}

/* ============================================================
   FETCH + INIT
   ============================================================ */
let _refreshTimer = null;

async function loadGame(gameId, sport) {
  const urlFn = ESPN_SUMMARY[sport];
  if (!urlFn) {
    showError(`Sport <strong>${sport.toUpperCase()}</strong> is not supported.`);
    return;
  }

  try {
    const resp = await fetch(urlFn(gameId), { signal: AbortSignal.timeout(7000) });
    if (!resp.ok) throw new Error(`ESPN returned ${resp.status}`);
    const data = await resp.json();

    const game        = parseGame(data, sport, gameId);
    const linescore   = parseLinescore(data, sport, game);
    const stats       = parseTeamStats(data, sport, game);
    const playerStats = parsePlayerStats(data, sport, game);
    const plays       = parsePlays(data, sport);

    renderPage(game, linescore, stats, playerStats, plays);

    /* Auto-refresh only while game is live */
    clearInterval(_refreshTimer);
    if (game.status === 'live') {
      _refreshTimer = setInterval(() => loadGame(gameId, sport), 30_000);
    }
  } catch (err) {
    showError(`Could not load game data for <strong>${sport.toUpperCase()}</strong>.<br><br><span style="font-size:11px;color:#444">${err.message}</span>`);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const params  = new URLSearchParams(window.location.search);
  const gameId  = params.get('id');
  const sport   = (params.get('sport') || '').toLowerCase();

  if (!gameId || !sport) {
    showError('No game ID or sport specified in the URL.');
    return;
  }

  loadGame(gameId, sport);
});
</script>
