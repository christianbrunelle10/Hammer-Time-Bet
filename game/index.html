<htb-nav></htb-nav>

<div id="game-root">
  <div class="not-found">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    <h2>Loading…</h2>
    <p>Fetching game data.</p>
  </div>
</div>

  <div class="footer-brand">Hammer<em>Time</em>Bet</div>
  <p>For entertainment purposes only. Not financial advice. Must be 21+. Please gamble responsibly.</p>
</footer>

<script>
/* ============================================================
   LINESCORE PARSER — period-by-period scoring from ESPN summary
   ============================================================ */
function parseLinescore(data, sport, game) {
  const comp  = data.header?.competitions?.[0] || {};
  const comps = comp.competitors || [];
  const awayC = comps.find(c => c.homeAway === 'away') || comps[0] || {};
  const homeC = comps.find(c => c.homeAway === 'home') || comps[1] || {};
  const awayLS = awayC.linescores || [];
  const homeLS = homeC.linescores || [];

  if (!awayLS.length && !homeLS.length) return null;

  const periodLabel = ({
    mlb:   i => `${i + 1}`,
    nba:   i => `Q${i + 1}`,
    nfl:   i => `Q${i + 1}`,
    ncaaf: i => `Q${i + 1}`,
    ncaam: i => i < 2 ? `H${i + 1}` : `OT${i - 1}`,
    nhl:   i => `P${i + 1}`,
  })[sport] || (i => `${i + 1}`);

  const count = Math.max(awayLS.length, homeLS.length);
  const lines = Array.from({ length: count }, (_, i) => ({
    label:   periodLabel(i),
    awayVal: awayLS[i]?.displayValue ?? '—',
    homeVal: homeLS[i]?.displayValue ?? '—',
  }));

  return {
    awayName:  game.away.name,
    homeName:  game.home.name,
    awayScore: game.away.score,
    homeScore: game.home.score,
    lines,
  };
}

/* ============================================================
   TEAM STATS PARSER — real ESPN boxscore stats
   Keys are lowercased for resilient matching against ESPN output.
   ============================================================ */
function parseTeamStats(data, sport, game) {
  const teams = (data.boxscore || {}).teams || [];
  if (!teams.length) return [];

  const awayTeam = teams.find(t => t.homeAway === 'away') || teams[0];
  const homeTeam = teams.find(t => t.homeAway === 'home') || teams[1] || teams[0];

  function flatten(statList) {
    const vals = {}, lbls = {};
    (statList || []).forEach(s => {
      if (s.stats) {
        s.stats.forEach(sub => {
          if (!sub.name) return;
          const v = sub.displayValue != null ? String(sub.displayValue) : '';
          if (v !== '') vals[sub.name] = v;
          const l = sub.label || sub.displayName || sub.shortDisplayName;
          if (l) lbls[sub.name] = l;
        });
      } else if (s.name) {
        const v = s.displayValue != null ? String(s.displayValue) : '';
        if (v !== '') vals[s.name] = v;
        const l = s.label || s.displayName || s.shortDisplayName;
        if (l) lbls[s.name] = l;
      }
    });
    return { vals, lbls };
  }

  const aw = flatten(awayTeam?.statistics);
  const hw = flatten(homeTeam?.statistics);
  const labelMap = { ...hw.lbls, ...aw.lbls };

  const allKeys = [
    ...Object.keys(aw.vals),
    ...Object.keys(hw.vals).filter(k => !(k in aw.vals)),
  ];
  if (!allKeys.length) return [];

  const priority = {
    mlb:   ['runs','hits','errors','leftOnBase','homeRuns','strikeOuts','walks','rbi'],
    nba:   ['fieldGoals','threePointFieldGoals','freeThrows','totalRebounds',
            'offensiveRebounds','assists','steals','blocks','turnovers','fouls'],
    nfl:   ['totalYards','passingYards','rushingYards','firstDowns','turnovers',
            'thirdDownEff','redZoneEff','penaltyYards'],
    ncaaf: ['totalYards','passingYards','rushingYards','firstDowns','turnovers','thirdDownEff'],
    ncaam: ['fieldGoals','threePointFieldGoals','freeThrows','totalRebounds',
            'assists','steals','turnovers'],
    nhl:   ['shotsOnGoal','saves','savePct','powerPlayGoals','powerPlayOpportunities',
            'hits','faceOffWinPercentage','blockedShots','giveaways','takeaways'],
  };
  const wantedLower = new Set((priority[sport] || []).map(k => k.toLowerCase()));

  const prioRows = [], otherRows = [];
  allKeys.forEach(key => {
    const av = aw.vals[key];
    const hv = hw.vals[key];
    if (!av && !hv) return;
    const rawLabel = labelMap[key] ||
      key.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/^./, c => c.toUpperCase());
    const row = { label: rawLabel, away: av || '—', home: hv || '—' };
    (wantedLower.has(key.toLowerCase()) ? prioRows : otherRows).push(row);
  });

  return prioRows.length ? prioRows : otherRows.slice(0, 10);
}

/* ============================================================
   PLAYER STATS COLUMN FILTER — per-sport label whitelist
   ============================================================ */
function filterStatCols(labels, sport, catName) {
  const all = labels.map((l, i) => ({ label: l, idx: i }));
  const wantNBA   = new Set(['MIN','FG','3PT','FT','OREB','REB','AST','STL','BLK','TO','PF','PTS']);
  const wantNCAAM = new Set(['MIN','FG','3PT','FT','REB','AST','STL','TO','PTS']);
  const mlbWant = {
    batting:  new Set(['AB','R','H','RBI','HR','BB','SO','AVG']),
    pitching: new Set(['IP','H','R','ER','BB','SO','HR','ERA']),
  };

  if (sport === 'nba') {
    const f = all.filter(c => wantNBA.has(c.label));
    return f.length ? f : all.slice(0, 10);
  }
  if (sport === 'ncaam') {
    const f = all.filter(c => wantNCAAM.has(c.label));
    return f.length ? f : all.slice(0, 9);
  }
  if (sport === 'mlb') {
    const ws = mlbWant[catName.toLowerCase()];
    if (ws) {
      const f = all.filter(c => ws.has(c.label));
      return f.length ? f : all.slice(0, 8);
    }
  }
  if (sport === 'nhl') {
    /* Detect goalie vs skater by label content — ESPN's category name field
       varies across API versions ('Skaters', 'skater', 'athleteSkaterStats', etc.)
       and cannot be relied on for matching. Goalies always have SA and SV% labels. */
    const labelSet = new Set(labels);
    const isGoalie = labelSet.has('SA') || labelSet.has('SV%') || labelSet.has('GAA');

    const order = isGoalie
      ? ['GA','SA','SV','SV%','TOI']
      : ['G','A','+/-','S','SOG','SM','BS','PN','PIM','HT','TK','GV','SHFT','TOI','PPTOI','SHTOI','ESTOI','FW','FL','FO%'];

    /* Build a label→index map from ESPN's raw labels, walk the desired order,
       and return only columns ESPN actually provides — in the correct sequence.
       Columns not present in the response (e.g. YTDG) are silently dropped. */
    const labelIdx = new Map(labels.map((l, i) => [l, i]));
    const cols = order
      .filter(lbl => labelIdx.has(lbl))
      .map(lbl => ({ label: lbl, idx: labelIdx.get(lbl) }));
    return cols.length ? cols : all.slice(0, 8);
  }
  return all;
}

/* ============================================================
   PLAYER STATS PARSER — ESPN boxscore.players[]
   ============================================================ */
function parsePlayerStats(data, sport, game) {
  const pd = (data.boxscore || {}).players || [];
  if (!pd.length) return [];

  const result = [];
  pd.forEach(entry => {
    const teamName = entry.team?.displayName || entry.team?.name ||
      (entry.homeAway === 'away' ? game.away.name : game.home.name);
    const homeAway = entry.homeAway || '';
    const categories = [];

    (entry.statistics || []).forEach(cat => {
      const catName = cat.name || '';
      const allLabels = cat.labels || cat.keys || [];
      if (!allLabels.length) return;

      if (sport === 'nhl') {
        console.log(`[HTBStats] NHL cat name="${catName}" displayName="${cat.displayName}" labels=[${allLabels.join(',')}]`);
      }

      const cols = filterStatCols(allLabels, sport, catName);
      if (!cols.length) return;

      const athletes = (cat.athletes || []).filter(a =>
        a.stats && a.stats.some(v => v != null && v !== '' && v !== '0' && v !== '0.0' && v !== '--' && v !== '-')
      );
      if (!athletes.length) return;

      categories.push({
        name: catName,
        displayName: cat.displayName || catName.replace(/^(.)/, c => c.toUpperCase()),
        cols,
        athletes: athletes.map(a => ({
          name: a.athlete?.shortName || a.athlete?.displayName || '—',
          stats: a.stats || [],
        })),
      });
    });

    if (categories.length) result.push({ teamName, homeAway, categories });
  });

  return result;
}

/* ============================================================
   FAVORITE DETECTION HELPER
   Determines whether the home team is the favorite using the
   parsed odds object (ml.home / ml.away). Handles null odds,
   missing values, and '—' placeholders safely.
   ============================================================ */
function isFavHome(odds) {
  // Prefer canonical favorite field set by HTBCanonical.fromESPNSummary
  if (odds?.favorite === 'home') return true;
  if (odds?.favorite === 'away') return false;
  // Fallback: compare moneylines from display shape
  const hStr = odds?.ml?.home || '';
  const aStr = odds?.ml?.away || '';
  const hML  = parseInt(hStr.replace('+', ''), 10);
  const aML  = parseInt(aStr.replace('+', ''), 10);
  if (!isNaN(hML) && !isNaN(aML)) return hML <= aML;
  if (!isNaN(hML)) return hML < 0;
  if (!isNaN(aML)) return aML > 0;
  // No ML data: check spread direction
  const hLn = parseInt((odds?.line?.home || '').split(' ')[0], 10);
  if (!isNaN(hLn)) return hLn < 0;
  return true;
}

/* ============================================================
   RISK FACTORS
   ============================================================ */
function buildRisks(game, sport) {
  const risks = {
    mlb:   ['Starting pitcher pitch count could limit deep appearances if early trouble arises', 'Bullpen workload elevated over past 4 days — potential fatigue in late innings', 'Weather conditions may introduce variables not captured in base model', 'Lineup construction: injuries to key bats reduce projected run total'],
    nba:   ['Injury reports may shift lineup assumptions — monitor pre-game availability', 'Schedule fatigue: second night of back-to-back for away team', 'Foul trouble risk for key interior players vs aggressive offense', 'Total variance is high in this pace matchup — model spread could narrow'],
    nfl:   ['Weather forecast includes wind gusts 15+ mph — impacts passing game value', 'Key offensive lineman questionable — monitoring for game-time decision', 'Red zone efficiency can be volatile week-to-week; sample size caveat applies', 'Tight line offers limited value cushion — unit sizing adjusted accordingly'],
    ncaaf: ['Transfer portal turnover means limited historical sample for current rosters', 'Crowd factor for home team may not be fully captured in model', 'Scheme adjustment tendencies vary — second-half adjustments can swing spread', 'Line movement suggests some sharp disagreement with model output'],
    ncaam: ['Tournament context (if applicable) adds variance not present in regular season', 'Foul trouble for key players can rapidly alter game flow', 'Small conference scheduling gaps may inflate certain efficiency metrics', 'Line has been bet heavily on one side — reverse line movement risk'],
    nhl:   ['Goaltender starts not always confirmed until pregame warmups', 'Back-to-back schedule increases injury and fatigue variance', 'Power play opportunity count is volatile and can swing total', 'Puck line at -1.5 requires decisive win — eliminates overtime value'],
  };

  return risks[sport] || ['Monitor injury reports before game time', 'Line movement may impact closing price', 'Weather or travel factors may apply'];
}

/* ============================================================
   ALTERNATE LEANS
   ============================================================ */
function buildAlts(game, odds, sport, pick) {
  const total    = odds?.total?.val || '—';
  const homeFav  = isFavHome(odds);
  const favTeam  = homeFav ? game.home.name : game.away.name;
  const dogTeam  = homeFav ? game.away.name : game.home.name;

  const pickStr     = (pick?.pick || '').toLowerCase();
  const favLower    = favTeam.toLowerCase();
  const dogLower    = dogTeam.toLowerCase();
  const pickedFavML = pickStr.includes(favLower) && pickStr.includes('ml');
  const pickedDogML = pickStr.includes(dogLower) && pickStr.includes('ml');
  const pickedFavLine = pickStr.includes(favLower) && !pickStr.includes('ml');
  const pickedDogLine = pickStr.includes(dogLower) && !pickStr.includes('ml');

  const alts = {
    mlb: [
      !pickedFavLine ? `First 5 innings: ${favTeam} -0.5 (value if starting pitcher dominates early)` : null,
      !pickedDogML   ? `${dogTeam} ML at plus money — live if game is close through 5` : null,
      `Under ${total} if both starters are sharp — lower-scoring game scenario`,
    ].filter(Boolean),
    nba: [
      !pickedDogLine ? `${dogTeam} +spread — backdoor cover potential if game tightens late` : null,
      `Over ${total} if pace accelerates in the opening quarter`,
      !pickedFavML   ? `${favTeam} ML — less variance than spread if you prefer the win bet` : null,
    ].filter(Boolean),
    nfl: [
      !pickedDogML   ? `${dogTeam} ML — live underdog if they start within a score` : null,
      `Under ${total} if wind or defensive play controls the tempo`,
      !pickedFavLine ? `${favTeam} team total over — offense expected to control possession` : null,
    ].filter(Boolean),
    ncaaf: [
      !pickedDogLine ? `${dogTeam} first-half spread if they start fast` : null,
      `Total under if both defenses tighten in the second half`,
      !pickedFavML   ? `${favTeam} ML instead of spread for less variance` : null,
    ].filter(Boolean),
    ncaam: [
      !pickedDogML   ? `${dogTeam} first-half ML — value if they dictate pace early` : null,
      `Over ${total} if both teams shoot above average from three`,
      !pickedFavLine ? `${favTeam} alternate spread at improved payout` : null,
    ].filter(Boolean),
    nhl: [
      !pickedFavML   ? `${favTeam} ML instead of puck line — avoids the -1.5 requirement` : null,
      `Over ${total} if both goalies allow early goals`,
      !pickedDogLine ? `${dogTeam} puck line +1.5 as a hedge on a tight game` : null,
    ].filter(Boolean),
  };

  const result = alts[sport] || [
    !pickedDogML ? `${dogTeam} ML at plus money — hedge play` : null,
    `Total ${total} under as contrarian lean`,
  ].filter(Boolean);

  return result.length ? result : [`No additional leans available beyond the primary pick for this game.`];
}

/* ============================================================
   FINAL VERDICT
   ============================================================ */
function buildVerdict(game, odds, sport, pick) {
  const homeFav = isFavHome(odds);
  const favTeam = homeFav ? game.home.name : game.away.name;
  const dogTeam = homeFav ? game.away.name : game.home.name;

  const verdicts = {
    mlb:   `The Hammer Model rates this a ${pick.conf.toFixed(1)}/10 confidence play on <strong>${pick.pick}</strong>. The pitching edge, line movement, and situational factors all point in the same direction. This is a 2-unit play at standard sizing. Monitor starting lineup and weather before locking in.`,
    nba:   `This is a ${pick.conf.toFixed(1)}/10 confidence spread play on <strong>${pick.pick}</strong>. Net rating differential, pace, and ATS trends support the model's output. Recommended at 2 units. Check injury report at tip-off before committing full allocation.`,
    nfl:   `The model rates this a ${pick.conf.toFixed(1)}/10 confidence play on <strong>${pick.pick}</strong>. EPA metrics, line movement, and situational edges align. Standard 2-unit recommendation. Weather updates should be monitored if wind becomes a factor.`,
    ncaaf: `This is a ${pick.conf.toFixed(1)}/10 confidence play on <strong>${pick.pick}</strong>. Efficiency metrics and home-field factors justify the play. 2-unit sizing appropriate. Note: college lines can move late — get in before kickoff if possible.`,
    ncaam: `The Hammer Model rates this a ${pick.conf.toFixed(1)}/10 confidence play on <strong>${pick.pick}</strong>. Adjusted efficiency ratings and line movement support the projection. Standard 2-unit play. Check for late scratches or lineup changes before tip-off.`,
    nhl:   `This is a ${pick.conf.toFixed(1)}/10 confidence play on <strong>${pick.pick}</strong>. Underlying metrics, goaltending edge, and puck line history support the model's output. 2-unit standard recommendation. Confirm goaltender start in pregame warmups.`,
  };

  return verdicts[sport] || `The Hammer Model rates this a ${pick.conf.toFixed(1)}/10 confidence play on <strong>${pick.pick}</strong>. Key factors align in favor of this play at current market pricing. Recommended at 2 units.`;
}

/* ============================================================
   RENDERERS
   ============================================================ */
function renderOdds(odds, sport) {
  if (!odds) return '<p style="color:#555;font-size:13px">Odds not available for this game.</p>';
  const lineLabel = sport === 'mlb' ? 'Run Line' : sport === 'nhl' ? 'Puck Line' : 'Spread';
  const aMl = odds.ml?.away || '—', hMl = odds.ml?.home || '—';
  const aLn = odds.line?.away?.split(' ')[0] || '—', hLn = odds.line?.home?.split(' ')[0] || '—';
  const tot = odds.total?.val || '—';
  const aLnOdds = odds.line?.away?.match(/\(([^)]+)\)/)?.[1] || '';
  const hLnOdds = odds.line?.home?.match(/\(([^)]+)\)/)?.[1] || '';

  const favMl  = n => parseInt(n.replace('+','')) < 0 ? 'fav' : '';
  const favLn  = n => parseInt(n.replace('+','')) < 0 ? 'fav' : '';

  return `
    <div class="odds-row">
      <div class="odds-block">
        <div class="odds-lbl">Moneyline</div>
        <div class="odds-teams">
          <div class="odds-team-row">
            <div class="odds-team-name">Away</div>
            <div class="odds-val ${favMl(aMl)}">${aMl}</div>
          </div>
          <div class="odds-team-row">
            <div class="odds-team-name">Home</div>
            <div class="odds-val ${favMl(hMl)}">${hMl}</div>
          </div>
        </div>
      </div>
      <div class="odds-block">
        <div class="odds-lbl">${lineLabel}</div>
        <div class="odds-teams">
          <div class="odds-team-row">
            <div class="odds-team-name">Away</div>
            <div class="odds-val">${aLn} <span style="font-size:11px;color:#555">${aLnOdds}</span></div>
          </div>
          <div class="odds-team-row">
            <div class="odds-team-name">Home</div>
            <div class="odds-val">${hLn} <span style="font-size:11px;color:#555">${hLnOdds}</span></div>
          </div>
        </div>
      </div>
      <div class="odds-block">
        <div class="odds-lbl">Total (O/U)</div>
        <div class="odds-teams">
          <div class="odds-team-row">
            <div class="odds-team-name">Over</div>
            <div class="odds-val">O ${tot}</div>
          </div>
          <div class="odds-team-row">
            <div class="odds-team-name">Under</div>
            <div class="odds-val">U ${tot}</div>
          </div>
        </div>
      </div>
    </div>`;
}

function renderBoxScore(ls) {
  if (!ls || !ls.lines?.length) return '<p style="color:#555;font-size:13px">Box score not available for this game.</p>';
  const hdrs = ls.lines.map(l => `<th>${l.label}</th>`).join('');
  const aRow = ls.lines.map(l => `<td>${l.awayVal}</td>`).join('');
  const hRow = ls.lines.map(l => `<td>${l.homeVal}</td>`).join('');
  return `
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:#555;flex:1;text-align:center">${ls.awayName}</div>
      <div style="flex:4"></div>
      <div style="font-size:11px;font-weight:700;color:#555;flex:1;text-align:center">${ls.homeName}</div>
    </div>
    <div class="bs-table-wrap">
      <table class="bs-table">
        <thead><tr><th>Team</th>${hdrs}<th class="bs-sep">Total</th></tr></thead>
        <tbody>
          <tr><td>${ls.awayName}</td>${aRow}<td class="bs-sep">${ls.awayScore}</td></tr>
          <tr><td>${ls.homeName}</td>${hRow}<td class="bs-sep">${ls.homeScore}</td></tr>
        </tbody>
      </table>
    </div>`;
}

function renderStats(stats, game) {
  if (!stats.length) return '<p style="color:#555;font-size:13px;margin-top:16px">Team stats not available for this game.</p>';
  return `
    <div style="margin-top:16px;display:grid;grid-template-columns:1fr auto 1fr;gap:4px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444;padding:0 12px;margin-bottom:6px">
      <span>${game.away.name}</span><span></span><span style="text-align:right">${game.home.name}</span>

    <div class="stats-grid">
      ${stats.map(s => `
        <div class="stat-row">
          <span class="stat-away">${s.away}</span>
          <span class="stat-lbl">${s.label}</span>
          <span class="stat-home">${s.home}</span>
        </div>`).join('')}
    </div>`;
}

function renderPlayerStats(playerStats, game, sport) {
  if (!playerStats.length) {
    return '<p style="color:#555;font-size:13px;margin-top:20px">Player stats not available for this game.</p>';
  }
  return `<div style="margin-top:20px">${
    playerStats.map(team => `
      <div class="ps-team-block">
        <div class="ps-team-name">${team.teamName}</div>
        ${team.categories.map(cat => `
          <div class="ps-cat-block">
            <div class="ps-cat-title">${cat.displayName}</div>
            <div class="ps-tbl-wrap">
              <table class="ps-tbl">
                <thead>
                  <tr>
                    <th class="ps-pl">Player</th>
                    ${cat.cols.map(c => `<th>${c.label}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>
                  ${cat.athletes.map(a => `
                    <tr>
                      <td class="ps-pl">${a.name}</td>
                      ${cat.cols.map(c => `<td>${a.stats[c.idx] ?? '—'}</td>`).join('')}
                    </tr>`).join('')}

}

function renderPick(pick) {
  const badge   = pick.edge     || 'strong';
  const badgeLbl = pick.edgeLabel || 'Pick';
  const units   = pick.units != null ? pick.units : 1.0;
  const confPct = `${Math.round(pick.conf * 10)}%`;
  return `
    <div class="pick-card">
      <div class="pick-header">
        <div class="pick-eyebrow">★ Hammer Best Bet</div>
        <span class="pick-badge ${badge}">${badgeLbl}</span>

        <div class="pick-meta-item">

          <div class="pick-meta-lbl">Odds</div>
        </div>
        <div class="pick-meta-item">
          <div class="pick-meta-val">${units}u</div>
          <div class="pick-meta-lbl">Recommended</div>
        </div>
        <div class="pick-meta-item">

}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function renderGame(game, odds, sport, data, apiPick) {
  const isLive    = game.status === 'live';
  const isFinal   = game.status === 'final';
  const showScore = isLive || isFinal;
  const aScore    = game.away.score || '0';
  const hScore    = game.home.score || '0';
  const aLead     = parseInt(aScore) > parseInt(hScore);
  const statusLbl = isLive ? 'LIVE' : isFinal ? 'FINAL' : game.gameTime;
  const statusCls = isLive ? 'live' : isFinal ? 'final' : 'pre';
  const sportLabel  = sport.toUpperCase();
  const backHref    = `/${sport}/`;
  const linescore   = data ? parseLinescore(data, sport, game) : null;
  const teamStats   = data ? parseTeamStats(data, sport, game) : [];
  const playerStats = data ? parsePlayerStats(data, sport, game) : [];
  const risks       = buildRisks(game, sport);
  const alts        = buildAlts(game, odds, sport, apiPick);
  const verdict     = apiPick ? buildVerdict(game, odds, sport, apiPick) : null;

  document.title = `${game.away.name} vs ${game.home.name} — HammerTimeBet`;

  document.getElementById('game-root').innerHTML = `
    <div class="back-wrap">
      <a href="${backHref}" class="back-link">Back to ${sportLabel}</a>
    </div>

    <!-- MATCHUP HERO -->
    <div class="matchup-hero">
      <div class="matchup-inner">
        <div class="matchup-meta">
          <span class="sport-tag">${sportLabel}</span>
          <span class="game-status-badge ${statusCls}">
            ${isLive ? '<span class="live-dot"></span>' : ''}${statusLbl}
          </span>
        </div>
        <div class="scoreboard">
          <div class="team-block ${showScore && aLead ? 'winner' : ''}">
            <div class="team-label">Away</div>
            <div class="team-name">${game.away.name}</div>
            ${game.away.rec ? `<div class="team-record">${game.away.rec}</div>` : ''}
            <div class="team-score ${showScore ? (aLead ? 'lead' : 'trail') : 'pre'}">${showScore ? aScore : game.gameTime}</div>
          </div>
          <div class="vs-col">
            <div class="vs-label">VS</div>
            ${isLive ? `<div class="game-time-lbl" style="color:#00d084">${game.state}</div>` : ''}
          </div>
          <div class="team-block ${showScore && !aLead ? 'winner' : ''}">
            <div class="team-label">Home</div>
            <div class="team-name">${game.home.name}</div>
            ${game.home.rec ? `<div class="team-record">${game.home.rec}</div>` : ''}
            <div class="team-score ${showScore ? (!aLead ? 'lead' : 'trail') : 'pre'}">${showScore ? hScore : game.gameTime}</div>
          </div>
        </div>
        ${apiPick ? `<a href="#hammer-pick" class="pick-cta">★ View Hammer Pick ↓</a>` : ''}
      </div>
    </div>

    <!-- HAMMER BEST BET — first section after scoreboard -->
    ${apiPick ? `
    <section class="section" id="hammer-pick">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Hammer Model</div>
          <h2 class="sec-title">Best Bet</h2>
        </div>
        ${renderPick(apiPick)}
        <p style="margin-top:12px;font-size:11px;color:#444">For entertainment purposes only. Not financial advice.</p>
      </div>
    </section>` : ''}

    <!-- GAME LINES -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Matchup Overview</div>
          <h2 class="sec-title">Game Lines</h2>
        </div>
        ${renderOdds(odds, sport)}
      </div>
    </section>

    <!-- BOX SCORE -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Full Box Score</div>
          <h2 class="sec-title">Score Summary</h2>
        </div>
        ${renderBoxScore(linescore)}
        ${renderStats(teamStats, game)}
      </div>
    </section>

    <!-- PLAYER STATS -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Player Breakdown</div>
          <h2 class="sec-title">Player Stats</h2>
        </div>
        ${renderPlayerStats(playerStats, game, sport)}
      </div>
    </section>

    <!-- MODEL REASONING -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Model Reasoning</div>
          <h2 class="sec-title">Why It Rates Well</h2>
        </div>
        <div class="analysis-card">
          ${apiPick?.reasons?.length
            ? `<div class="factor-list">${apiPick.reasons.map(r => `<div class="factor">${r}</div>`).join('')}</div>`
            : `<p class="analysis-summary" style="color:#555">Model reasoning will be available closer to game time.</p>`
          }
        </div>
      </div>
    </section>

    <!-- RISK FACTORS -->
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Due Diligence</div>
          <h2 class="sec-title">Risk Factors</h2>
        </div>
        <div class="info-card">
          ${risks.map(r => `<div class="risk-item">${r}</div>`).join('')}

    <!-- ALTERNATE LEANS -->
    <section class="section">

    <section class="section">

          <div class="eyebrow">Bottom Line</div>
          <h2 class="sec-title">Final Verdict</h2>
        </div>

          <p class="verdict-text">${verdict}</p>
        </div>
        <p style="margin-top:12px;font-size:11px;color:#444">For entertainment purposes only. Not financial advice.</p>
      </div>
    </section>` : ''}
  `;
}

function showError(msg) {
  document.getElementById('game-root').innerHTML = `
    <div class="not-found">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <h2>Game Not Found</h2>
      <p>${msg}</p>
      <a href="./" style="display:inline-block;margin-top:20px;color:#f0b429;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">← Back to Home</a>
    </div>`;
}

/* ============================================================
   ESPN SUMMARY ENDPOINTS (mirrors data.js)
   ============================================================ */
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports';
const ESPN_SUMMARY = {
  mlb:   id => `${ESPN_BASE}/baseball/mlb/summary?event=${id}`,
  nba:   id => `${ESPN_BASE}/basketball/nba/summary?event=${id}`,
  nfl:   id => `${ESPN_BASE}/football/nfl/summary?event=${id}`,
  ncaaf: id => `${ESPN_BASE}/football/college-football/summary?event=${id}`,
  ncaam: id => `${ESPN_BASE}/basketball/mens-college-basketball/summary?event=${id}`,
  nhl:   id => `${ESPN_BASE}/hockey/nhl/summary?event=${id}`,
};

/* Parse ESPN summary response — delegates to canonical layer */
function parseESPNSummary(data, sport) {
  return HTBCanonical.fromESPNSummary(data, sport);
}

/* Convert canonical game.odds → display shape expected by renderGame() and build*() functions.
   Preserves odds.favorite so isFavHome() can use it without re-parsing. */
function adaptOddsForDisplay(game) {
  const o = game?.odds;
  if (!o) return null;
  const fmtLine = (spread, spreadOdds) =>
    spread ? `${spread} (${spreadOdds || '-110'})` : '—';
  return {
    favorite: o.favorite,
    ml:    { away: o.away.ml || '—', home: o.home.ml || '—' },
    line:  { away: fmtLine(o.away.spread, o.away.spreadOdds), home: fmtLine(o.home.spread, o.home.spreadOdds) },
    total: { val: o.total || '—' },
  };
}

/* ============================================================
   INIT — fetches real ESPN data
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('id');
  const sport  = (params.get('sport') || '').toLowerCase();

  if (!gameId || !sport) {
    showError('No game ID or sport specified in the URL.');
    return;
  }

  const urlFn = ESPN_SUMMARY[sport];
  if (!urlFn) {
    showError(`Sport <strong>${sport.toUpperCase()}</strong> is not supported.`);
    return;
  }

  try {
    /* Fetch ESPN game data and the official Hammer pick for this game in parallel */
    const [espnResp, pickResp] = await Promise.all([
      fetch(urlFn(gameId), { signal: AbortSignal.timeout(7000) }),
      fetch(`/api/pick?id=${encodeURIComponent(gameId)}&sport=${sport}`, { signal: AbortSignal.timeout(7000) }),
    ]);

    if (!espnResp.ok) throw new Error(`ESPN returned ${espnResp.status}`);
    const data     = await espnResp.json();
    const pickData = pickResp.ok ? await pickResp.json() : null;

    const game = parseESPNSummary(data, sport);
    const odds = adaptOddsForDisplay(game);
    const pick = pickData?.pick || null;

    renderGame(game, odds, sport, data, pick);
  } catch (err) {
    showError(`Could not load game data for <strong>${sport.toUpperCase()} ${gameId}</strong>. The game may have ended or ESPN data is temporarily unavailable.<br><br><span style="font-size:11px;color:#444">${err.message}</span>`);
  }
});
</script>
