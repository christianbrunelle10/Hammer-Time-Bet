<htb-nav></htb-nav>

<div id="game-root">
  <div class="not-found">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    <h2>Loading…</h2>
    <p>Fetching game data.</p>

  <p>For entertainment purposes only. Not financial advice. Must be 21+. Please gamble responsibly.</p>

<script>
/* ============================================================
   LINESCORE PARSER — period-by-period scoring from ESPN summary
   ============================================================ */
function parseLinescore(data, sport, game) {
  const comp  = data.header?.competitions?.[0] || {};
  const comps = comp.competitors || [];
  const awayC = comps.find(c => c.homeAway === 'away') || comps[0] || {};
  const homeC = comps.find(c => c.homeAway === 'home') || comps[1] || {};
  const awayLS = awayC.linescores || [];
  const homeLS = homeC.linescores || [];

  if (!awayLS.length && !homeLS.length) return null;

  const periodLabel = ({
    mlb:   i => `${i + 1}`,
    nba:   i => `Q${i + 1}`,
    nfl:   i => `Q${i + 1}`,
    ncaaf: i => `Q${i + 1}`,
    ncaam: i => i < 2 ? `H${i + 1}` : `OT${i - 1}`,
    nhl:   i => `P${i + 1}`,
  })[sport] || (i => `${i + 1}`);

  const count = Math.max(awayLS.length, homeLS.length);
  const lines = Array.from({ length: count }, (_, i) => ({
    label:   periodLabel(i),
    awayVal: awayLS[i]?.displayValue ?? '—',
    homeVal: homeLS[i]?.displayValue ?? '—',
  }));

  return {
    awayName:  game.away.name,
    homeName:  game.home.name,
    awayScore: game.away.score,
    homeScore: game.home.score,
    lines,
  };
}

/* ============================================================
   TEAM STATS PARSER — real ESPN boxscore stats
   Keys are lowercased for resilient matching against ESPN output.
   ============================================================ */
function parseTeamStats(data, sport, game) {
  const teams = (data.boxscore || {}).teams || [];
  if (!teams.length) return [];

  const awayTeam = teams.find(t => t.homeAway === 'away') || teams[0];
  const homeTeam = teams.find(t => t.homeAway === 'home') || teams[1] || teams[0];

  function flatten(statList) {
    const vals = {}, lbls = {};
    (statList || []).forEach(s => {
      if (s.stats) {
        s.stats.forEach(sub => {
          if (!sub.name) return;
          const v = sub.displayValue != null ? String(sub.displayValue) : '';
          if (v !== '') vals[sub.name] = v;
          const l = sub.label || sub.displayName || sub.shortDisplayName;
          if (l) lbls[sub.name] = l;
        });
      } else if (s.name) {
        const v = s.displayValue != null ? String(s.displayValue) : '';
        if (v !== '') vals[s.name] = v;
        const l = s.label || s.displayName || s.shortDisplayName;
        if (l) lbls[s.name] = l;
      }
    });
    return { vals, lbls };
  }

  const aw = flatten(awayTeam?.statistics);
  const hw = flatten(homeTeam?.statistics);
  const labelMap = { ...hw.lbls, ...aw.lbls };

  const allKeys = [
    ...Object.keys(aw.vals),
    ...Object.keys(hw.vals).filter(k => !(k in aw.vals)),
  ];
  if (!allKeys.length) return [];

  const priority = {
    mlb:   ['runs','hits','errors','leftOnBase','homeRuns','strikeOuts','walks','rbi'],
    nba:   ['fieldGoals','threePointFieldGoals','freeThrows','totalRebounds',
            'offensiveRebounds','assists','steals','blocks','turnovers','fouls'],
    nfl:   ['totalYards','passingYards','rushingYards','firstDowns','turnovers',
            'thirdDownEff','redZoneEff','penaltyYards'],
    ncaaf: ['totalYards','passingYards','rushingYards','firstDowns','turnovers','thirdDownEff'],
    ncaam: ['fieldGoals','threePointFieldGoals','freeThrows','totalRebounds',
            'assists','steals','turnovers'],
    nhl:   ['shotsOnGoal','saves','savePct','powerPlayGoals','powerPlayOpportunities',
            'hits','faceOffWinPercentage','blockedShots','giveaways','takeaways'],
  };
  const wantedLower = new Set((priority[sport] || []).map(k => k.toLowerCase()));

  const prioRows = [], otherRows = [];
  allKeys.forEach(key => {
    const av = aw.vals[key];
    const hv = hw.vals[key];
    if (!av && !hv) return;
    const rawLabel = labelMap[key] ||
      key.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/^./, c => c.toUpperCase());
    const row = { label: rawLabel, away: av || '—', home: hv || '—' };
    (wantedLower.has(key.toLowerCase()) ? prioRows : otherRows).push(row);
  });

  return prioRows.length ? prioRows : otherRows.slice(0, 10);
}

/* ============================================================
   PLAYER STATS COLUMN FILTER — per-sport label whitelist
   ============================================================ */
function filterStatCols(labels, sport, catName) {
  const all = labels.map((l, i) => ({ label: l, idx: i }));
  const wantNBA   = new Set(['MIN','FG','3PT','FT','OREB','REB','AST','STL','BLK','TO','PF','PTS']);
  const wantNCAAM = new Set(['MIN','FG','3PT','FT','REB','AST','STL','TO','PTS']);
  const mlbWant = {
    batting:  new Set(['AB','R','H','RBI','HR','BB','SO','AVG']),
    pitching: new Set(['IP','H','R','ER','BB','SO','HR','ERA']),
  };

  if (sport === 'nba') {
    const f = all.filter(c => wantNBA.has(c.label));
    return f.length ? f : all.slice(0, 10);
  }
  if (sport === 'ncaam') {
    const f = all.filter(c => wantNCAAM.has(c.label));
    return f.length ? f : all.slice(0, 9);
  }
  if (sport === 'mlb') {
    const ws = mlbWant[catName.toLowerCase()];
    if (ws) {
      const f = all.filter(c => ws.has(c.label));
      return f.length ? f : all.slice(0, 8);
    }
  }
  if (sport === 'nhl') {
    /* Detect goalie vs skater by label content — ESPN's category name field
       varies across API versions ('Skaters', 'skater', 'athleteSkaterStats', etc.)
       and cannot be relied on for matching. Goalies always have SA and SV% labels. */
    const labelSet = new Set(labels);
    const isGoalie = labelSet.has('SA') || labelSet.has('SV%') || labelSet.has('GAA');

    const order = isGoalie
      ? ['GA','SA','SV','SV%','TOI']
      : ['G','A','+/-','S','SOG','SM','BS','PN','PIM','HT','TK','GV','SHFT','TOI','PPTOI','SHTOI','ESTOI','FW','FL','FO%'];

    /* Build a label→index map from ESPN's raw labels, walk the desired order,
       and return only columns ESPN actually provides — in the correct sequence.
       Columns not present in the response (e.g. YTDG) are silently dropped. */
    const labelIdx = new Map(labels.map((l, i) => [l, i]));
    const cols = order
      .filter(lbl => labelIdx.has(lbl))
      .map(lbl => ({ label: lbl, idx: labelIdx.get(lbl) }));
    return cols.length ? cols : all.slice(0, 8);
  }
  return all;
}

/* ============================================================
   PLAYER STATS PARSER — ESPN boxscore.players[]
   ============================================================ */
function parsePlayerStats(data, sport, game) {
  const pd = (data.boxscore || {}).players || [];
  if (!pd.length) return [];

  const result = [];
  pd.forEach(entry => {
    const teamName = entry.team?.displayName || entry.team?.name ||
      (entry.homeAway === 'away' ? game.away.name : game.home.name);
    const homeAway = entry.homeAway || '';
    const categories = [];

    (entry.statistics || []).forEach(cat => {
      const catName = cat.name || '';
      const allLabels = cat.labels || cat.keys || [];
      if (!allLabels.length) return;

      if (sport === 'nhl') {
        console.log(`[HTBStats] NHL cat name="${catName}" displayName="${cat.displayName}" labels=[${allLabels.join(',')}]`);
      }

      const cols = filterStatCols(allLabels, sport, catName);
      if (!cols.length) return;

      const athletes = (cat.athletes || []).filter(a =>
        a.stats && a.stats.some(v => v != null && v !== '' && v !== '0' && v !== '0.0' && v !== '--' && v !== '-')
      );
      if (!athletes.length) return;

      categories.push({
        name: catName,
        displayName: cat.displayName || catName.replace(/^(.)/, c => c.toUpperCase()),
        cols,
        athletes: athletes.map(a => ({
          name: a.athlete?.shortName || a.athlete?.displayName || '—',
          stats: a.stats || [],
        })),
      });
    });

    if (categories.length) result.push({ teamName, homeAway, categories });
  });

  return result;
}

/* ============================================================
   PLAYER EXTRACTION
   Mirrors server-side extractPlayers but runs on the client
   using the live ESPN summary data object.
   ============================================================ */
function _extractPlayersFromData(data, sport, game) {
  const out = {};
  if (!data) return out;
  try {
    if (sport === 'mlb') {
      (data.probables || []).forEach(p => {
        const side = p.homeAway === 'home' ? 'home' : 'away';
        out[`${side}Pitcher`]    = p.athlete?.shortName || p.athlete?.displayName || null;
        out[`${side}PitcherERA`] = p.statistics?.find(s => s.name === 'ERA')?.displayValue || null;
        const wins = p.statistics?.find(s => s.name === 'wins')?.displayValue;
        const loss = p.statistics?.find(s => s.name === 'losses')?.displayValue;
        out[`${side}PitcherRec`] = (wins != null && loss != null) ? `${wins}-${loss}` : null;
      });
    }
    if (sport === 'nhl') {
      (data.rosters || []).forEach(roster => {
        const side    = roster.homeAway === 'home' ? 'home' : 'away';
        const goalies = (roster.roster || []).filter(p => p.position?.abbreviation === 'G');
        const starter = goalies.find(g => g.starter === true) || goalies[0];
        if (starter) out[`${side}Goalie`] = starter.athlete?.shortName || starter.athlete?.displayName || null;
      });
    }
    if (sport === 'nba' || sport === 'ncaam') {
      (data.leaders || []).forEach((tl, idx) => {
        const abbr   = (tl.team?.abbreviation || '').toUpperCase();
        const homeAb = (game.home.abbr || '').toUpperCase();
        const awayAb = (game.away.abbr || '').toUpperCase();
        let side = null;
        if (abbr && homeAb && abbr === homeAb) side = 'home';
        else if (abbr && awayAb && abbr === awayAb) side = 'away';
        else side = idx === 0 ? 'home' : 'away';
        const ptsLeaders = (tl.leaders || []).find(c => c.name === 'points' || c.abbreviation === 'PTS');
        const top = ptsLeaders?.leaders?.[0];
        if (top) {
          out[`${side}Leader`]    = top.athlete?.shortName || top.athlete?.displayName || null;
          out[`${side}LeaderPts`] = top.displayValue || null;
        }
      });
    }
    if (sport === 'nfl' || sport === 'ncaaf') {
      (data.leaders || []).forEach((tl, idx) => {
        const abbr   = (tl.team?.abbreviation || '').toUpperCase();
        const homeAb = (game.home.abbr || '').toUpperCase();
        const awayAb = (game.away.abbr || '').toUpperCase();
        let side = null;
        if (abbr && homeAb && abbr === homeAb) side = 'home';
        else if (abbr && awayAb && abbr === awayAb) side = 'away';
        else side = idx === 0 ? 'home' : 'away';
        const passLeaders = (tl.leaders || []).find(c => c.name === 'passingYards' || c.abbreviation === 'PYDS');
        const passTop = passLeaders?.leaders?.[0];
        if (passTop) out[`${side}QB`] = passTop.athlete?.shortName || passTop.athlete?.displayName || null;
        const rushLeaders = (tl.leaders || []).find(c => c.name === 'rushingYards' || c.abbreviation === 'RYDS');
        const rushTop = rushLeaders?.leaders?.[0];
        if (rushTop) out[`${side}RB`] = rushTop.athlete?.shortName || rushTop.athlete?.displayName || null;
      });
    }
  } catch(e) {}
  return out;
}

/* ============================================================
   FAVORITE DETECTION HELPER
   Determines whether the home team is the favorite using the
   parsed odds object (ml.home / ml.away). Handles null odds,
   missing values, and '—' placeholders safely.
   ============================================================ */
function isFavHome(odds) {
  // Prefer canonical favorite field set by HTBCanonical.fromESPNSummary
  if (odds?.favorite === 'home') return true;
  if (odds?.favorite === 'away') return false;
  // Fallback: compare moneylines from display shape
  const hStr = odds?.ml?.home || '';
  const aStr = odds?.ml?.away || '';
  const hML  = parseInt(hStr.replace('+', ''), 10);
  const aML  = parseInt(aStr.replace('+', ''), 10);
  if (!isNaN(hML) && !isNaN(aML)) return hML <= aML;
  if (!isNaN(hML)) return hML < 0;
  if (!isNaN(aML)) return aML > 0;
  // No ML data: check spread direction
  const hLn = parseInt((odds?.line?.home || '').split(' ')[0], 10);
  if (!isNaN(hLn)) return hLn < 0;
  return true;
}

/* ============================================================
   RISK FACTORS
   Built dynamically from the actual pick type, actual odds, and
   actual player data. No sport-indexed template arrays.
   ============================================================ */
function buildRisks(game, sport, odds, pick, players) {
  const favIsHome = isFavHome(odds);
  const fav = favIsHome ? game.home.name : game.away.name;
  const dog = favIsHome ? game.away.name : game.home.name;
  const total = odds?.total?.val || null;
  const pickStr = (pick?.pick || '').toLowerCase();
  const isSpread = !pickStr.startsWith('over') && !pickStr.startsWith('under') && !pickStr.includes('ml') && !!pick?.pick?.match(/[+-]\d/);
  const isOver   = pickStr.startsWith('over');
  const isUnder  = pickStr.startsWith('under');
  const lineVal  = pick?.pick?.match(/([+-]\d+\.?\d*)/)?.[1] || null;
  const pickOdds = pick?.odds || null;

  const favPitcher    = favIsHome ? players?.homePitcher    : players?.awayPitcher;
  const dogPitcher    = favIsHome ? players?.awayPitcher    : players?.homePitcher;
  const favPitcherERA = favIsHome ? players?.homePitcherERA : players?.awayPitcherERA;
  const dogPitcherERA = favIsHome ? players?.awayPitcherERA : players?.homePitcherERA;
  const favGoalie     = favIsHome ? players?.homeGoalie     : players?.awayGoalie;
  const dogGoalie     = favIsHome ? players?.awayGoalie     : players?.homeGoalie;
  const favQB         = favIsHome ? players?.homeQB         : players?.awayQB;
  const dogQB         = favIsHome ? players?.awayQB         : players?.homeQB;
  const favLeader     = favIsHome ? players?.homeLeader     : players?.awayLeader;
  const dogLeader     = favIsHome ? players?.awayLeader     : players?.homeLeader;
  const favLeaderPts  = favIsHome ? players?.homeLeaderPts  : players?.awayLeaderPts;
  const dogLeaderPts  = favIsHome ? players?.awayLeaderPts  : players?.homeLeaderPts;

  const risks = [];

  /* ── R1: What specifically invalidates this bet ── */
  if (isSpread && lineVal) {
    if (sport === 'mlb') {
      risks.push(favPitcher
        ? `Run line ${lineVal} requires a decisive win — even with ${favPitcher} on the mound, a single crooked-number inning or a blown save flips the cover while ${fav} still wins outright`
        : `Run line ${lineVal} requires a decisive win — any one-run game loses the cover even when ${fav} wins outright`);
    } else if (sport === 'nhl') {
      risks.push(favGoalie
        ? `Puck line ${lineVal} requires a two-goal win — even with ${favGoalie} in net, a game decided in overtime results in a one-goal final that loses the spread while ${fav} wins outright`
        : `Puck line ${lineVal} requires a two-goal win — games decided in overtime result in a one-goal final that loses the spread even when ${fav} wins outright`);
    } else if (sport === 'nfl' || sport === 'ncaaf') {
      risks.push(favQB
        ? `${fav} ${lineVal} depends on ${favQB} protecting the ball — a red-zone turnover returned for a score is a 14-point swing that erases the spread without changing who dominated the game`
        : `${fav} ${lineVal} — a turnover returned for a score or a blocked special teams play can flip the cover without changing who controlled the game`);
    } else if (sport === 'nba' || sport === 'ncaam') {
      risks.push(favLeader
        ? `${fav} ${lineVal} is vulnerable to a backdoor cover — ${favLeader} sitting in garbage time while ${dog} cuts the margin with free throws in the final 90 seconds is the most common way spreads flip`
        : `${fav} ${lineVal} carries backdoor cover risk — ${dog} cutting the margin with late free throws is the most common way favorites fail to cover in this sport`);
    }
  } else if (isOver && total) {
    if (sport === 'mlb') {
      risks.push(favPitcher
        ? `Over ${total} breaks down if ${favPitcher} is locked in — a starter commanding the zone through 6+ innings suppresses the scoring output below this number`
        : `Over ${total} breaks down if either starter dominates early — one dominant pitching performance suppresses this total from first pitch`);
    } else if (sport === 'nhl') {
      const gs = [favGoalie, dogGoalie].filter(Boolean);
      risks.push(gs.length
        ? `Over ${total} breaks down if ${gs.join(' or ')} gets hot early — elite goaltending from either crease locks in the under regardless of shot volume`
        : `Over ${total} is vulnerable if either goalie gets hot — one dominant goaltending performance can wall off a game that both offenses are winning`);
    } else {
      risks.push(`Over ${total} requires both offenses to produce from the start — a defensive first quarter or half locks in the under trajectory early and is hard to reverse`);
    }
  } else if (isUnder && total) {
    if (sport === 'mlb') {
      risks.push(dogPitcher
        ? `Under ${total} breaks down if ${dogPitcher} gets chased early — once a starter exits before the 5th, bullpen innings generate runs at a faster clip`
        : `Under ${total} breaks down if either starter gets chased early — bullpen innings generate runs faster than any starter model predicts`);
    } else if (sport === 'nhl') {
      risks.push(`Under ${total} breaks down if either team draws early power plays — a penalty-heavy first period generates prime scoring chances that push this number past the posted total`);
    } else {
      risks.push(`Under ${total} — one explosive drive or special teams score early locks in an over trajectory that is very hard to reverse regardless of how the rest of the game plays`);
    }
  } else if (pickOdds) {
    const mlNum = parseInt(String(pickOdds).replace('+', ''), 10);
    const isHeavy = !isNaN(mlNum) && mlNum <= -200;
    const keyPlayer = sport === 'mlb' ? favPitcher : sport === 'nhl' ? favGoalie : (sport === 'nfl' || sport === 'ncaaf') ? favQB : favLeader;
    if (isHeavy) {
      risks.push(`${fav} at ${pickOdds} is a heavy favorite — the return requires ${fav} to win outright, and any upset at this price is a significant bankroll event. A single bad stretch from ${dog} reshapes the value equation.`);
    } else {
      risks.push(keyPlayer
        ? `${keyPlayer} has the edge, but ${fav} at ${pickOdds} leaves limited margin for error — one extended hot stretch from ${dog} reshapes the value at this price regardless of the final result`
        : `${fav} at ${pickOdds} — any off-game from ${fav} or a sustained run from ${dog} flips the value equation at this price. The margin for error is narrower than it looks.`);
    }
  }

  /* ── R2: Primary player vulnerability (fav side) ── */
  if (sport === 'mlb' && favPitcher) {
    risks.push(`${favPitcher} exiting before the 5th is the single biggest structural risk — once he leaves, the bullpen inherits a live game and variance increases significantly`);
  } else if (sport === 'nhl' && favGoalie) {
    risks.push(`${favGoalie}'s performance determines the full range of outcomes — one bad period or a deflection at the wrong moment reshapes this game regardless of the underlying edge`);
  } else if ((sport === 'nfl' || sport === 'ncaaf') && favQB) {
    risks.push(`${favQB} in the red zone is the highest-leverage moment of this game — a turnover when ${fav} is in scoring position can flip the score, the spread, and the tempo in a single play`);
  } else if ((sport === 'nba' || sport === 'ncaam') && favLeader) {
    risks.push(`Foul trouble on ${favLeader} is the highest-leverage in-game scenario — two early fouls limits the offensive engine, reduces pace, and changes the scoring range for the entire game`);
  }

  /* ── R3: Opposition counterfactor ── */
  if (sport === 'mlb' && dogPitcher) {
    const eraStr = dogPitcherERA ? ` (${dogPitcherERA} ERA)` : '';
    risks.push(`${dogPitcher}${eraStr} counters for ${dog} — if he holds ${fav} through 5 innings, the run-line margin is in real jeopardy`);
  } else if (sport === 'nhl' && dogGoalie) {
    risks.push(`${dogGoalie} in the crease for ${dog} is the primary counterfactor — a goalie playing at his ceiling can wall off this game regardless of the shots-on-goal count`);
  } else if ((sport === 'nfl' || sport === 'ncaaf') && dogQB) {
    risks.push(`${dogQB} can generate one explosive series when ${dog} needs it most — a single scoring drive from the underdog late is enough to flip the cover`);
  } else if ((sport === 'nba' || sport === 'ncaam') && dogLeader) {
    const ptsStr = dogLeaderPts ? ` (${dogLeaderPts} PPG)` : '';
    risks.push(`${dogLeader}${ptsStr} is the primary counterfactor — a scorer at this level makes ${dog} dangerous at any price, and a 30-point night from him flips the spread`);
  }

  /* ── R4: Total context (only when directly relevant to pick) ── */
  if (total && !isOver && !isUnder) {
    if (sport === 'mlb') {
      risks.push(`Run environment: total at ${total} — if the game flows to the under side, scoring dries up late when the margin is hardest to predict`);
    } else if (sport === 'nhl') {
      risks.push(`Total at ${total} is sensitive to special teams — a single 5-on-3 opportunity that converts can push the score in either direction on its own`);
    }
  }

  /* ── Fallback ── */
  if (!risks.length) {
    risks.push(`${pick?.pick || `${fav} moneyline`} — standard single-game variance applies. No specific structural risk surfaces from the available pre-game data for this matchup.`);
  }

  return risks.slice(0, 4);
}

/* ============================================================
   ALTERNATE LEANS
   ============================================================ */
function buildAlts(game, odds, sport, pick, players) {
  const total    = odds?.total?.val || null;
  const homeFav  = isFavHome(odds);
  const favTeam  = homeFav ? game.home.name : game.away.name;
  const dogTeam  = homeFav ? game.away.name : game.home.name;
  const favML    = homeFav ? (odds?.ml?.home || null) : (odds?.ml?.away || null);
  const dogML    = homeFav ? (odds?.ml?.away || null) : (odds?.ml?.home || null);
  const favLine  = homeFav ? odds?.line?.home?.split(' ')[0] : odds?.line?.away?.split(' ')[0];
  const dogLine  = homeFav ? odds?.line?.away?.split(' ')[0] : odds?.line?.home?.split(' ')[0];
  const totalStr = total ? `${total}` : '—';

  const pickStr       = (pick?.pick || '').toLowerCase();
  const favLower      = favTeam.toLowerCase();
  const dogLower      = dogTeam.toLowerCase();
  const pickedFavML   = pickStr.includes(favLower) && pickStr.includes('ml');
  const pickedDogML   = pickStr.includes(dogLower) && pickStr.includes('ml');
  const pickedFavLine = pickStr.includes(favLower) && !pickStr.includes('ml');
  const pickedDogLine = pickStr.includes(dogLower) && !pickStr.includes('ml');
  const pickedOver    = pickStr.startsWith('over');
  const pickedUnder   = pickStr.startsWith('under');

  const favPitcher = homeFav ? players?.homePitcher : players?.awayPitcher;
  const dogPitcher = homeFav ? players?.awayPitcher : players?.homePitcher;
  const favGoalie  = homeFav ? players?.homeGoalie  : players?.awayGoalie;
  const dogGoalie  = homeFav ? players?.awayGoalie  : players?.homeGoalie;
  const favQB      = homeFav ? players?.homeQB      : players?.awayQB;
  const dogQB      = homeFav ? players?.awayQB      : players?.homeQB;
  const favLeader  = homeFav ? players?.homeLeader  : players?.awayLeader;
  const dogLeader  = homeFav ? players?.awayLeader  : players?.homeLeader;

  const alts = {
    mlb: [
      !pickedFavLine && favLine
        ? (favPitcher
            ? `${favTeam} run line ${favLine} — when ${favPitcher} goes deep and the bullpen holds the lead, the run line pays better than the straight moneyline`
            : `${favTeam} run line ${favLine} — when the starter goes deep and the bullpen holds a lead, the run line pays better than the straight moneyline at a price worth the requirement`)
        : null,
      !pickedDogML && dogML
        ? (dogPitcher
            ? `${dogTeam} ML (${dogML}) — if ${dogPitcher} holds ${favTeam} through five innings, the plus-money value is sustainable at the final horn`
            : `${dogTeam} ML (${dogML}) — if their starter holds ${favTeam} through five innings, the plus-money value is sustainable at the final horn`)
        : null,
      !pickedUnder && total
        ? (favPitcher && dogPitcher
            ? `Under ${totalStr} — if ${favPitcher} and ${dogPitcher} are both locked in and commanding their secondary pitches, this game finishes well below the number`
            : `Under ${totalStr} — if both starters are locked in and command their secondary pitches, this game finishes below the current number`)
        : null,
      !pickedOver && total
        ? (dogPitcher
            ? `First 5 innings over — if ${dogPitcher} allows early runs before settling in, the scoring front-loads before the bullpens take over`
            : `First 5 innings over — if either starter allows early runs, the scoring front-loads before the bullpens take over`)
        : null,
    ].filter(Boolean).slice(0, 3),
    nba: [
      !pickedDogLine && dogLine
        ? (dogLeader
            ? `${dogTeam} ${dogLine} — ${dogLeader} keeping it competitive in the fourth quarter is the most realistic path to a backdoor cover`
            : `${dogTeam} ${dogLine} — a live backdoor cover if the game tightens in the fourth quarter, which is the most common way favorites fail to cover in the NBA`)
        : null,
      !pickedOver && total
        ? (favLeader && dogLeader
            ? `Over ${totalStr} — if ${favLeader} and ${dogLeader} are both clicking from the opening tip and neither defense settles in, the total can be reached by the third quarter`
            : `Over ${totalStr} — if the pace is fast from the opening tip and neither defense settles in, the total can be reached by the third quarter`)
        : null,
      !pickedFavML && favML
        ? (favLeader
            ? `${favTeam} ML (${favML}) — removes the cover requirement; ${favLeader} in rhythm makes this a win they find a way to get even if it's close`
            : `${favTeam} ML (${favML}) — pure win bet that removes the cover requirement and still pays if ${favTeam} wins a close one in the final 30 seconds`)
        : null,
      !pickedUnder && total
        ? (favLeader
            ? `Under ${totalStr} — if ${favLeader} faces heavy defensive attention and ${dogTeam} slows the pace, the scoring finishes below this number`
            : `Under ${totalStr} — if the game becomes a physical half-court battle, the scoring pace finishes below this number`)
        : null,
    ].filter(Boolean).slice(0, 3),
    nfl: [
      !pickedDogML && dogML
        ? (dogQB
            ? `${dogTeam} ML (${dogML}) — pure underdog play; ${dogQB} has the experience to keep this close and the plus-money value holds if ${dogTeam} stays within a score at halftime`
            : `${dogTeam} ML (${dogML}) — pure underdog play that wins on any ${dogTeam} victory; live value holds if they stay within a score at halftime`)
        : null,
      !pickedUnder && total
        ? (favQB
            ? `Under ${totalStr} — if the ${dogTeam} defense gets consistent pressure on ${favQB} in the first half, the game can finish well below this number`
            : `Under ${totalStr} — if both defenses control the line of scrimmage in the first half, the game can finish well below this number`)
        : null,
      !pickedFavLine && favLine
        ? (favQB
            ? `${favTeam} first-half spread ${favLine} — ${favQB} typically controls early possession time and the halftime margin is often more decisive than the final`
            : `${favTeam} first-half spread ${favLine} — the favorite's offense typically controls early possession time and the halftime margin is often more decisive than the final`)
        : null,
      !pickedOver && total
        ? (dogQB
            ? `Over ${totalStr} — if ${dogQB} gets off to a fast start, the scoring pace accelerates early and the total becomes reachable faster than the number implies`
            : `Over ${totalStr} — if either offense finds rhythm on the opening drive, the pace can exceed what ${totalStr} implies`)
        : null,
    ].filter(Boolean).slice(0, 3),
    ncaaf: [
      !pickedDogLine && dogLine
        ? (dogQB
            ? `${dogTeam} first-half spread ${dogLine} — ${dogQB} at home is historically competitive before fatigue and depth differentials create separation in the fourth quarter`
            : `${dogTeam} first-half spread ${dogLine} — home underdogs in college football are historically competitive before fatigue and depth differentials create separation in the fourth quarter`)
        : null,
      !pickedUnder && total
        ? (dogQB
            ? `Under ${totalStr} — if ${dogQB} manages the clock and ${dogTeam} commits to the ground game, the total finishes well below this number`
            : `Under ${totalStr} — if ${dogTeam} commits to running the ball and controlling the clock, the total finishes well below this number`)
        : null,
      !pickedFavML && favML
        ? (favQB
            ? `${favTeam} ML (${favML}) — if ${favQB} protects the ball, the win without the cover requirement is the safer entry point on this game`
            : `${favTeam} ML (${favML}) — removes all spread variance; the win without the cover requirement is the safer entry point`)
        : null,
      !pickedOver && total
        ? `Over ${totalStr} — if either defense is susceptible to the pass, this game can finish well over the number once fourth-quarter tempo opens up`
        : null,
    ].filter(Boolean).slice(0, 3),
    ncaam: [
      !pickedDogML && dogML
        ? (dogLeader
            ? `${dogTeam} first half — if ${dogLeader} gets going early, ${dogTeam} can dictate pace and cover the first-half spread even in games they lose outright`
            : `${dogTeam} first half — college underdogs who dictate early pace frequently cover the first-half spread even in games they lose outright`)
        : null,
      !pickedOver && total
        ? (favLeader
            ? `Over ${totalStr} — if ${favLeader} gets going early and both teams shoot at or above their three-point averages, the over becomes the clear play`
            : `Over ${totalStr} — if both teams shoot at or above their three-point averages in the first ten minutes, the over becomes the clear play`)
        : null,
      !pickedFavLine && favLine
        ? `${favTeam} alternate spread ${favLine} — buying down the number reduces cover risk while still paying meaningful value if the talent gap shows up late`
        : null,
      !pickedUnder && total
        ? (favLeader
            ? `Under ${totalStr} — if ${favLeader} faces tight defensive attention and ${dogTeam} slows the tempo, the scoring pace finishes below this number`
            : `Under ${totalStr} — if ${dogTeam} slows the tempo and makes this a possession game, the scoring pace finishes below this number`)
        : null,
    ].filter(Boolean).slice(0, 3),
    nhl: [
      !pickedFavML && favML
        ? (favGoalie
            ? `${favTeam} ML (${favML}) — removes the two-goal requirement; wins on any ${favTeam} victory including overtime. ${favGoalie} in net gives this real value.`
            : `${favTeam} ML (${favML}) — removes the two-goal requirement entirely and wins on any ${favTeam} victory including overtime and the shootout`)
        : null,
      !pickedOver && total
        ? (dogGoalie
            ? `Over ${totalStr} — if ${dogGoalie} allows an early goal and penalty trouble creates power play opportunities, the total can be reached by the early third period`
            : `Over ${totalStr} — if both goalies allow early goals and power play opportunities create traffic, the total can be reached by the early third period`)
        : null,
      !pickedDogLine && dogLine
        ? (dogGoalie
            ? `${dogTeam} puck line ${dogLine} — buys a full goal of cushion; wins if ${dogGoalie} keeps the game within one goal at the final horn`
            : `${dogTeam} puck line ${dogLine} — buys a full goal of cushion; wins if ${dogTeam} keeps the game within one goal at the final horn including overtime`)
        : null,
      !pickedUnder && total
        ? (favGoalie
            ? `Under ${totalStr} — if ${favGoalie} is sharp early and the game plays physical and low-penalty, the scoring pace does not reach this number`
            : `Under ${totalStr} — if both goalies are sharp early and the game plays physical and low-penalty, the scoring pace does not reach this number`)
        : null,
    ].filter(Boolean).slice(0, 3),
  };

  const result = alts[sport] || [
    !pickedDogML && dogML ? `${dogTeam} ML (${dogML}) — value play for bettors who think the game is closer than the market implies` : null,
    total ? `Under ${totalStr} — contrarian lean if both teams play conservative and the game becomes a possession battle` : null,
  ].filter(Boolean);

  return result.length ? result : [`The primary pick represents the clearest edge in this game — no high-confidence alternate lean is available.`];
}

/* ============================================================
   MATCHUP CONTEXT ENGINE
   Extracts real available data from the ESPN summary response.
   Returns [{ title, points[] }] cards — never invents stats.
   If detailed data is absent, returns honest structural context.
   ============================================================ */

/** Pull game leaders from data.leaders, filtered by category keyword. */
function _gameLeaders(data, keywords) {
  const out = [];
  (data.leaders || []).forEach(cat => {
    const name = (cat.name || cat.displayName || '').toLowerCase();
    if (!keywords.some(k => name.includes(k))) return;
    (cat.leaders || []).slice(0, 2).forEach(l => {
      const player = l.athlete?.shortName || l.athlete?.displayName;
      if (!player) return;
      const abbr = l.team?.abbreviation ? ` (${l.team.abbreviation})` : '';
      const val  = l.displayValue || '';
      const lbl  = cat.shortDisplayName || cat.displayName || '';
      if (val) out.push(`${player}${abbr} — ${lbl}: ${val}`);
    });
  });
  return out;
}

/** Season records card from canonical game object. */
function _recordsCard(game) {
  const pts = [];
  if (game.away.rec) pts.push(`${game.away.name}: ${game.away.rec}`);
  if (game.home.rec) pts.push(`${game.home.name}: ${game.home.rec} (home)`);
  return pts.length ? { title: 'Season Records', points: pts } : null;
}

/** Current spread line from the display odds object. */
function _spreadLine(odds, favTeam) {
  const fav = odds?.favorite;
  const sp  = fav === 'home' ? odds?.home?.spread : odds?.away?.spread;
  return sp ? `Current spread: ${favTeam} ${sp}` : null;
}

/** Builds a list of actual data points for the matchup fallback card.
 *  Only includes values that are genuinely known — no invented analysis. */
function _oddsDataCard(game, odds, favTeam, dogTeam) {
  const pts = [];
  const favML = odds?.favorite === 'home' ? odds?.ml?.home : odds?.ml?.away;
  const dogML = odds?.favorite === 'home' ? odds?.ml?.away : odds?.ml?.home;
  const sp    = _spreadLine(odds, favTeam);
  const total = odds?.total?.val;
  if (favML) pts.push(`${favTeam}: ${favML} (moneyline favorite)`);
  if (dogML) pts.push(`${dogTeam}: ${dogML} (moneyline underdog)`);
  if (sp)    pts.push(sp);
  if (total) pts.push(`Total: ${total}`);
  if (game.away.rec) pts.push(`${game.away.name} record: ${game.away.rec}`);
  if (game.home.rec) pts.push(`${game.home.name} record: ${game.home.rec}`);
  return pts;
}

function buildMatchupContext(data, game, odds, sport, apiPick) {
  const cards   = [];
  const homeFav = isFavHome(odds);
  const favTeam = homeFav ? game.home.name : game.away.name;
  const dogTeam = homeFav ? game.away.name : game.home.name;

  /* ── MLB ── */
  if (sport === 'mlb') {
    const probs = (data.probables || []).filter(p => p.athlete?.displayName || p.athlete?.shortName);
    if (probs.length) {
      const pts = probs.map(p => {
        const name   = p.athlete.shortName || p.athlete.displayName || '—';
        const prefix = p.team?.abbreviation ? `${p.team.abbreviation}: ` : '';
        const stats  = (p.statistics || [])
          .filter(s => s.displayValue && s.displayValue !== '--' && s.displayValue !== '0')
          .map(s => `${s.abbreviation || s.name} ${s.displayValue}`)
          .slice(0, 4).join(', ');
        return `${prefix}${name}${stats ? ` (${stats})` : ''}`;
      });
      cards.push({ title: 'Probable Starters', points: pts });
    }
    const leaders = _gameLeaders(data, ['batting','hitting','pitching','scoring']);
    if (leaders.length) cards.push({ title: 'Game Leaders', points: leaders.slice(0, 6) });
    const rc = _recordsCard(game);
    if (rc) cards.push(rc);
    if (!probs.length && !leaders.length) {
      const pts = _oddsDataCard(game, odds, favTeam, dogTeam);
      cards.push({ title: 'Pre-game Data', points: pts.length ? pts : ['Starter and lineup data not yet available — check back closer to first pitch.'] });
    }
  }

  /* ── NBA ── */
  if (sport === 'nba') {
    const leaders = _gameLeaders(data, ['scoring','rebound','assist','block','steal']);
    if (leaders.length) cards.push({ title: 'Game Leaders', points: leaders.slice(0, 6) });
    const rc = _recordsCard(game);
    if (rc) cards.push(rc);
    if (!leaders.length) {
      const pts = _oddsDataCard(game, odds, favTeam, dogTeam);
      cards.push({ title: 'Pre-game Data', points: pts.length ? pts : ['Player and scoring data not yet available — check back closer to tip-off.'] });
    }
  }

  /* ── NFL ── */
  if (sport === 'nfl') {
    const leaders = _gameLeaders(data, ['passing','rushing','receiving','sack','interception','defense','tackle']);
    if (leaders.length) cards.push({ title: 'Game Leaders', points: leaders.slice(0, 8) });
    const rc = _recordsCard(game);
    if (rc) cards.push(rc);
    if (!leaders.length) {
      const pts = _oddsDataCard(game, odds, favTeam, dogTeam);
      cards.push({ title: 'Pre-game Data', points: pts.length ? pts : ['Player and stat data not yet available — check back closer to kickoff.'] });
    }
  }

  /* ── NHL ── */
  if (sport === 'nhl') {
    const leaders = _gameLeaders(data, ['goal','assist','point','save','goaltend']);
    if (leaders.length) cards.push({ title: 'Game Leaders', points: leaders.slice(0, 6) });
    const rc = _recordsCard(game);
    if (rc) cards.push(rc);
    if (!leaders.length) {
      const pts = _oddsDataCard(game, odds, favTeam, dogTeam);
      cards.push({ title: 'Pre-game Data', points: pts.length ? pts : ['Goaltender and stat data not yet available — check back closer to puck drop.'] });
    }
  }

  /* ── NCAAF ── */
  if (sport === 'ncaaf') {
    const leaders = _gameLeaders(data, ['passing','rushing','receiving','defense','tackle','sack']);
    if (leaders.length) cards.push({ title: 'Game Leaders', points: leaders.slice(0, 6) });
    const rc = _recordsCard(game);
    if (rc) cards.push(rc);
    if (!leaders.length) {
      const pts = _oddsDataCard(game, odds, favTeam, dogTeam);
      cards.push({ title: 'Pre-game Data', points: pts.length ? pts : ['Player and stat data not yet available — check back closer to kickoff.'] });
    }
  }

  /* ── NCAAM ── */
  if (sport === 'ncaam') {
    const leaders = _gameLeaders(data, ['scoring','rebound','assist','block','steal']);
    if (leaders.length) cards.push({ title: 'Game Leaders', points: leaders.slice(0, 6) });
    const rc = _recordsCard(game);
    if (rc) cards.push(rc);
    if (!leaders.length) {
      const pts = _oddsDataCard(game, odds, favTeam, dogTeam);
      cards.push({ title: 'Pre-game Data', points: pts.length ? pts : ['Player and scoring data not yet available — check back closer to tip-off.'] });
    }
  }

  /* ── Golf ── */
  if (sport === 'golf') {
    const pickedPlayer = apiPick?.pick || '—';
    const betType = (() => {
      const p = pickedPlayer.toLowerCase();
      if (p.includes('top 5'))  return 'Top 5 finish';
      if (p.includes('top 10')) return 'Top 10 finish';
      if (p.includes('top 20')) return 'Top 20 finish';
      if (p.includes('top 30')) return 'Top 30 finish';
      if (p.includes('ml') || p.includes('win') || p.includes('outright')) return 'Outright win';
      return 'Tournament lean';
    })();
    const golferName = pickedPlayer.replace(/\s+(Top\s*\d+|ML|Outright|Win|to\s+Win|F5|\+\d+|-\d+).*$/i, '').trim();
    cards.push({
      title: golferName ? `${golferName} — Bet Overview` : 'Tournament Pick Overview',
      points: [
        `Pick: ${pickedPlayer}`,
        `Bet type: ${betType}`,
        apiPick?.odds ? `Odds: ${apiPick.odds}` : null,
        'Golf analysis uses available tournament context, course fit, and current form. Strokes-gained data, historical course results, and injury status are only referenced when confirmed in the event feed.',
      ].filter(Boolean),
    });
    cards.push({ title: 'Golf Analysis Note', points: [
      'Position plays (top 10/20) carry better risk-adjusted value than outright winners in most large fields.',
      'This lean is based on price, course fit, and matchup structure within the current field.',
    ]});
  }

  return cards;
}

/* ============================================================
   FINAL VERDICT
   ============================================================ */
function buildVerdict(game, odds, sport, pick, players) {
  const conf   = pick.conf.toFixed(1);
  const bet    = `<strong>${pick.pick}</strong>`;
  const units  = pick.units != null ? pick.units : 1.0;
  const uLabel = units <= 0.5 ? '0.5u lean' : units <= 1.5 ? '1u play' : `${units}u play`;

  const favIsHome = isFavHome(odds);
  const fav = favIsHome ? game.home.name : game.away.name;
  const dog = favIsHome ? game.away.name : game.home.name;

  const favPitcher = favIsHome ? players?.homePitcher : players?.awayPitcher;
  const favGoalie  = favIsHome ? players?.homeGoalie  : players?.awayGoalie;
  const favQB      = favIsHome ? players?.homeQB      : players?.awayQB;
  const favLeader  = favIsHome ? players?.homeLeader  : players?.awayLeader;
  const favLeaderPts = favIsHome ? players?.homeLeaderPts : players?.awayLeaderPts;

  // Use the pick's primary reason as the main anchor — makes every verdict unique
  const r0 = (pick.reasons && pick.reasons[0]) || '';
  const anchor = r0 ? ` ${r0.charAt(0).toLowerCase() + r0.slice(1).replace(/\.$/, '')}.` : '';

  const cta = (() => {
    if (sport === 'mlb') {
      return favPitcher
        ? `${favPitcher} on the mound is the edge that makes this number playable — keep it appropriately sized.`
        : `The number and price structure make this the right side — keep it appropriately sized.`;
    }
    if (sport === 'nba') {
      return favLeader
        ? `${favLeader} is the engine — when this player is healthy and engaged, ${fav} finds a way to get the result. Size accordingly.`
        : `The price is right and the matchup structure supports the play — size accordingly.`;
    }
    if (sport === 'nfl') {
      return favQB
        ? `${favQB} is the edge here — the talent advantage at quarterback and price structure align. Best value is at the current number.`
        : `The talent edge and price structure align — best value is at the current number before the line moves further.`;
    }
    if (sport === 'ncaaf') {
      return favQB
        ? `${favQB} at the controls for ${fav} at ${pick.odds} is the price play — the current number is where the value lives.`
        : `${fav} at ${pick.odds} — the current number is where the value is. Size to the confidence level.`;
    }
    if (sport === 'ncaam') {
      const lStr = favLeader ? (favLeaderPts ? `${favLeader} (${favLeaderPts} PPG)` : favLeader) : null;
      return lStr
        ? `${fav} at ${pick.odds} with ${lStr} healthy is the play — the number and the scorer support the edge.`
        : `${fav} at ${pick.odds} — the price and matchup structure support this play. Size to the confidence level shown.`;
    }
    if (sport === 'nhl') {
      return favGoalie
        ? `${favGoalie} in the crease is the single biggest edge in a one-goal sport — the price structure supports the play.`
        : `The crease situation and price structure make this the right play — in-form goaltending is the biggest edge in a one-goal sport.`;
    }
    if (sport === 'golf') {
      return `Golf carries four-round variance that no model fully captures — this lean is based on course fit, current form, and market pricing within the field.`;
    }
    return `Key factors align in favor of this play at current market pricing. Recommended at ${units} units.`;
  })();

  return `The Hammer Model rates ${bet} a ${conf}/10 confidence ${uLabel}.${anchor} ${cta}`;
}

    ${verdict ? `
    <section class="section">
      <div class="section-inner">
        <div class="section-head">
          <div class="eyebrow">Bottom Line</div>
          <h2 class="sec-title">Final Verdict</h2>
        </div>
        <div class="verdict-card">
          <p class="verdict-text">${verdict}</p>
        </div>
        <p style="margin-top:12px;font-size:11px;color:#444">For entertainment purposes only. Not financial advice.</p>
      </div>
    </section>` : ''}
  `;
}

function showError(msg) {
  document.getElementById('game-root').innerHTML = `
    <div class="not-found">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <h2>Game Not Found</h2>
      <p>${msg}</p>
      <a href="./" style="display:inline-block;margin-top:20px;color:#f0b429;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase">← Back to Home</a>
    </div>`;
}

/* ============================================================
   LIVE LINES — render normalized /api/game-odds response
   ============================================================ */
function renderLiveLines(d, sport) {
  if (!d) {
    return '<p style="color:#555;font-size:13px">Live lines unavailable for this game.</p>';
  }
  const lineLabel = sport === 'mlb' ? 'Run Line' : sport === 'nhl' ? 'Puck Line' : 'Spread';
  const favCls = v => {
    const n = parseInt((v || '').replace('+', ''), 10);
    return !isNaN(n) && n < 0 ? 'fav' : '';
  };

  const aMl      = d.moneylineAway || '—';
  const hMl      = d.moneylineHome || '—';
  const aSpd     = d.spreadAway?.split(' ')[0] || '—';
  const hSpd     = d.spreadHome?.split(' ')[0] || '—';
  const aSpdOdds = d.spreadAway?.match(/\(([^)]+)\)/)?.[1] || '';
  const hSpdOdds = d.spreadHome?.match(/\(([^)]+)\)/)?.[1] || '';
  const totOver   = d.totalOver  || '—';
  const totUnder  = d.totalUnder || '—';
  const overOdds  = d.overOdds  ? `(${d.overOdds})`  : '';
  const underOdds = d.underOdds ? `(${d.underOdds})` : '';
  const updatedStr = d.lastUpdated
    ? new Date(d.lastUpdated).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
    : null;

  return `
    <div class="odds-row">
      <div class="odds-block">
        <div class="odds-lbl">Moneyline</div>
        <div class="odds-teams">
          <div class="odds-team-row">
            <div class="odds-team-name">Away</div>
            <div class="odds-val ${favCls(aMl)}">${aMl}</div>
          </div>
          <div class="odds-team-row">
            <div class="odds-team-name">Home</div>
            <div class="odds-val ${favCls(hMl)}">${hMl}</div>
          </div>
        </div>
      </div>
      <div class="odds-block">
        <div class="odds-lbl">${lineLabel}</div>
        <div class="odds-teams">
          <div class="odds-team-row">
            <div class="odds-team-name">Away</div>
            <div class="odds-val">${aSpd} <span style="font-size:11px;color:#555">${aSpdOdds}</span></div>
          </div>
          <div class="odds-team-row">
            <div class="odds-team-name">Home</div>
            <div class="odds-val">${hSpd} <span style="font-size:11px;color:#555">${hSpdOdds}</span></div>
          </div>
        </div>
      </div>
      <div class="odds-block">
        <div class="odds-lbl">Total (O/U)</div>
        <div class="odds-teams">
          <div class="odds-team-row">
            <div class="odds-team-name">Over</div>
            <div class="odds-val">${totOver} <span style="font-size:11px;color:#555">${overOdds}</span></div>
          </div>
          <div class="odds-team-row">
            <div class="odds-team-name">Under</div>
            <div class="odds-val">${totUnder} <span style="font-size:11px;color:#555">${underOdds}</span></div>
          </div>
        </div>
      </div>
    </div>
    ${(d.bookmaker || updatedStr) ? `
    <div class="live-lines-meta">
      ${d.bookmaker  ? `<span class="ll-book">${d.bookmaker}</span>` : ''}
      ${updatedStr   ? `<span>Updated ${updatedStr}</span>` : ''}
    </div>` : ''}`;
}

/** Async: fetch /api/game-odds and inject into the Live Lines section. */
async function loadLiveLines(game, sport) {
  const contentEl = document.getElementById('live-lines-content');
  const eyebrowEl = document.querySelector('#live-lines-wrap .eyebrow');
  if (!contentEl) return;

  try {
    const qs = new URLSearchParams({
      sport,
      homeTeam: game.home.name,
      awayTeam: game.away.name,
    });
    const r = await fetch(`/api/game-odds?${qs}`, { signal: AbortSignal.timeout(8000) });
    if (r.status === 404) {
      contentEl.innerHTML = '<p style="color:#555;font-size:13px">Live lines unavailable for this game.</p>';
      return;
    }
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if (eyebrowEl && d.bookmaker) eyebrowEl.textContent = d.bookmaker;
    contentEl.innerHTML = renderLiveLines(d, sport);
  } catch {
    contentEl.innerHTML = '<p style="color:#555;font-size:13px">Live lines unavailable for this game.</p>';
  }
}

/* ============================================================
   ESPN SUMMARY ENDPOINTS (mirrors data.js)
   ============================================================ */
const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports';
const ESPN_SUMMARY = {
  mlb:   id => `${ESPN_BASE}/baseball/mlb/summary?event=${id}`,
  nba:   id => `${ESPN_BASE}/basketball/nba/summary?event=${id}`,
  nfl:   id => `${ESPN_BASE}/football/nfl/summary?event=${id}`,
  ncaaf: id => `${ESPN_BASE}/football/college-football/summary?event=${id}`,
  ncaam: id => `${ESPN_BASE}/basketball/mens-college-basketball/summary?event=${id}`,
  nhl:   id => `${ESPN_BASE}/hockey/nhl/summary?event=${id}`,
};

/* Parse ESPN summary response — delegates to canonical layer */
function parseESPNSummary(data, sport) {
  return HTBCanonical.fromESPNSummary(data, sport);
}

/* Convert canonical game.odds → display shape expected by renderGame() and build*() functions.
   Preserves odds.favorite so isFavHome() can use it without re-parsing. */
function adaptOddsForDisplay(game) {
  const o = game?.odds;
  if (!o) return null;
  const fmtLine = (spread, spreadOdds) =>
    spread ? `${spread} (${spreadOdds || '-110'})` : '—';
  return {
    favorite: o.favorite,
    ml:    { away: o.away.ml || '—', home: o.home.ml || '—' },
    line:  { away: fmtLine(o.away.spread, o.away.spreadOdds), home: fmtLine(o.home.spread, o.home.spreadOdds) },
    total: { val: o.total || '—' },
  };
}

/* ============================================================
   INIT — fetches real ESPN data
   ============================================================ */
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const gameId = params.get('id');
  const sport  = (params.get('sport') || '').toLowerCase();

  if (!gameId || !sport) {
    showError('No game ID or sport specified in the URL.');
    return;
  }

  const urlFn = ESPN_SUMMARY[sport];
  if (!urlFn) {
    showError(`Sport <strong>${sport.toUpperCase()}</strong> is not supported.`);
    return;
  }

  try {
    /* Fetch ESPN game data and Hammer pick in parallel; odds load separately after render */
    const [espnResp, pickResp] = await Promise.all([
      fetch(urlFn(gameId), { signal: AbortSignal.timeout(7000) }),
      fetch(`/api/pick?id=${encodeURIComponent(gameId)}&sport=${sport}`, { signal: AbortSignal.timeout(7000) }),
    ]);

    if (!espnResp.ok) throw new Error(`ESPN returned ${espnResp.status}`);
    const data     = await espnResp.json();
    const pickData = pickResp.ok ? await pickResp.json() : null;

    const game = parseESPNSummary(data, sport);
    const odds = adaptOddsForDisplay(game);
    const pick = pickData?.pick || null;

    renderGame(game, odds, sport, data, pick);
    loadLiveLines(game, sport);
  } catch (err) {
    showError(`Could not load game data for <strong>${sport.toUpperCase()} ${gameId}</strong>. The game may have ended or ESPN data is temporarily unavailable.<br><br><span style="font-size:11px;color:#444">${err.message}</span>`);
  }
});
</script>
